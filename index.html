<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>highcake.xyz</title>
  <meta name="description" content="it has been building since may 2026.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #090909; }

    .wrap { display: flex; height: 100vh; }

    /* ── Editor ─────────────────────────────────────────────────────────────── */
    .editor {
      position: relative;
      width: 42%;
      min-width: 280px;
      flex-shrink: 0;
      background: #0e0e0e;
      border-right: 1px solid #1c1c1c;
      display: flex;
      flex-direction: column;
      transition: width 0.35s ease, min-width 0.35s ease;
      overflow: visible;
    }
    .editor.collapsed { width: 0 !important; min-width: 0 !important; border-right-width: 0; }
    .editor-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

    #toggle-ed {
      position: absolute;
      top: 50%; right: -13px;
      transform: translateY(-50%);
      z-index: 10;
      width: 26px; height: 26px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #555; font-size: 15px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s, right 0.35s ease;
    }
    #toggle-ed:hover { color: #999; border-color: #444; }
    .editor.collapsed #toggle-ed { right: -26px; }

    .editor-chrome {
      background: #141414;
      border-bottom: 1px solid #1c1c1c;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; white-space: nowrap;
    }
    .traffic { display: flex; gap: 5px; }
    .traffic span { width: 11px; height: 11px; border-radius: 50%; display: block; }
    .t-r { background: #ff5f57; } .t-y { background: #febc2e; } .t-g { background: #28c840; }

    .chrome-tab {
      margin-left: 10px; font-size: 11px; color: #555;
      font-family: 'SF Mono','Fira Code',monospace; letter-spacing: 0.02em;
    }
    .age-badge { margin-left: auto; font-size: 10px; color: #333; font-family: 'SF Mono','Fira Code',monospace; }

    .editor-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 0 60px; }
    .editor-scroll::-webkit-scrollbar { width: 3px; }
    .editor-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    #code-pre {
      font-family: 'SF Mono','Fira Code','Cascadia Code','Menlo',monospace;
      font-size: 12px; line-height: 1.8; padding: 0 16px;
      white-space: pre-wrap; word-break: break-word;
      color: #abb2bf; min-height: 100%;
    }
    .cm   { color: #4b5263; font-style: italic; }
    .sel  { color: #e06c75; }
    .attr { color: #d19a66; }
    .val  { color: #98c379; }
    .prop { color: #61afef; }

    .cur {
      display: inline-block; width: 6px; height: 13px;
      background: #528bff; vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite; border-radius: 1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Preview ─────────────────────────────────────────────────────────────── */
    .preview-wrap {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
    }

    #built-site {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      scroll-behavior: smooth;
    }
    #built-site::-webkit-scrollbar { width: 4px; }
    #built-site::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

    .site-bar {
      padding: 8px 14px; border-top: 1px solid #141414;
      background: #0a0a0a; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .status { font-size: 10px; color: #2a2a2a; font-family: 'SF Mono','Fira Code',monospace; letter-spacing: 0.06em; }
    .btn-share {
      font-size: 10px; color: #333; background: none;
      border: 1px solid #1e1e1e; padding: 4px 10px; border-radius: 3px;
      cursor: pointer; font-family: 'SF Mono','Fira Code',monospace;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-share:hover { color: #666; border-color: #333; }
    .btn-share.ok { color: #4ade80; border-color: #4ade80; }

    /* ── Mobile ──────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .wrap { flex-direction: column; }
      .editor { width: 100% !important; min-width: 0 !important; height: 40vh; flex-shrink: 0; transition: height 0.35s ease; }
      .editor.collapsed { height: 0 !important; width: 100% !important; border-right-width: 1px; border-bottom-width: 0; }
      .editor-body { overflow: hidden; }
      #toggle-ed { top: auto; right: 50%; bottom: -13px; transform: translateX(50%); }
      .editor.collapsed #toggle-ed { bottom: -26px; }
      #code-pre { font-size: 11px; }
    }
  </style>
</head>

<div class="wrap">

    <div class="editor-body">

    <div id="built-site"></div>

      <span class="status" id="status"></span>
      <button class="btn-share" id="btn-share" onclick="share()">share</button>
    </div>
  </div>
</div>

<script>
// ── RNG ───────────────────────────────────────────────────────────────────────
class RNG {
  constructor(seed) { this.s = (seed ^ 0x9e3779b9) >>> 0 || 1; }
  next() { this.s ^= this.s << 13; this.s ^= this.s >> 17; this.s ^= this.s << 5; return (this.s >>> 0) / 0xffffffff; }
  pick(a)       { return a[Math.floor(this.next() * a.length)]; }
  int(a, b)     { return Math.floor(this.next() * (b - a + 1)) + a; }
  f(a, b)       { return this.next() * (b - a) + a; }
  bool(p = 0.5) { return this.next() < p; }
}

// ── Maturity & timing ─────────────────────────────────────────────────────────
const lerp     = (a, b, t) => a + (b - a) * t;
const maturity = i => Math.min(1, i / 1000);
const BIRTHDAY = new Date('2026-05-20T00:00:00Z').getTime();
const EPOCH    = 3 * 60 * 1000;
function age()      { return Date.now() - BIRTHDAY; }
function epochNow() { return Math.floor(age() / EPOCH); }
function progress() { return (age() % EPOCH) / EPOCH; }

function entryDate(i) {
  const d = new Date(BIRTHDAY + i * EPOCH);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function entryDateAttr(i) {
  const d = new Date(BIRTHDAY + i * EPOCH);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Content generation ───────────────────────────────────────────────────────────
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

const W = {
  sub:   ['this','everything','all of it','the work','the process','what\'s here',
          'the accumulation','the entries','the record','time','the pattern',
          'nothing','something','the additions','the list','what\'s building',
          'the site','the whole thing','most of it','any of it'],
  verb:  ['continues','persists','grows','compounds','builds','deepens',
          'stacks up','expands','remains','goes on','keeps going','adds up',
          'accumulates','piles up','layers','increases','extends'],
  state: ['is not finished','has no end','keeps building','is still going',
          'is becoming something','has been here a while','is what it is',
          'does not stop','is more than before','was started and not stopped',
          'has no clear shape','is accumulating','is ongoing','is unresolved',
          'keeps changing','refuses to stop'],
  iverb: ['keep going','keep adding','am still here','notice things',
          'come back','watch it build','add to this','have been here a while',
          'cannot stop','return','keep returning','stay with it',
          'am figuring it out','am not sure where this is going',
          'started this','did not plan to continue','lost count',
          'notice the pattern','keep watching','have no plans to stop'],
  noun:  ['entries','additions','layers','notes','fragments','records',
          'observations','things','accumulations','outputs','pieces',
          'items','parts','elements','instances'],
  adj:   ['more','ongoing','unfinished','persistent','dense','heavy',
          'quiet','slow','still','strange','unclear','substantial',
          'new','old','recent','extra','additional','further'],
  adv:   ['still','again','now','gradually','continuously','eventually',
          'somehow','anyway','regardless','endlessly','always','often'],
  subL:  ['the weight of it','all of this','what has built up','the density',
          'the archive','what started small','the long accumulation',
          'the full record','what is here now','the whole of it',
          'everything that followed','what i started'],
  verbL: ['presses down','settles','sits','holds','anchors','endures',
          'does not move','will not stop','has no end','persists'],
  adjL:  ['heavy','vast','irreversible','substantial','deep','complete',
          'overwhelming','permanent','total','immovable'],
};

function genSentence(rng, m) {
  const late = m > 0.5 && rng.bool(0.35);
  const sub = rng.pick(late ? W.subL  : W.sub);
  const vrb = rng.pick(late ? W.verbL : W.verb);
  const adj = rng.pick(late ? W.adjL  : W.adj);
  const t   = rng.int(0, 10);
  if (t === 0) return cap(`${sub} ${vrb}.`);
  if (t === 1) return cap(`${sub} ${rng.pick(W.state)}.`);
  if (t === 2) return cap(`I ${rng.pick(W.iverb)}.`);
  if (t === 3) return cap(`there ${rng.bool() ? 'are' : 'is'} ${rng.bool() ? adj+' ' : ''}${rng.pick(W.noun)} now.`);
  if (t === 4) return cap(`the ${rng.pick(W.noun)} ${vrb} ${rng.pick(W.adv)}.`);
  if (t === 5) return cap(`${adj} ${rng.pick(W.noun)}.`);
  if (t === 6) return cap(`${rng.pick(W.adv)}, ${sub} ${vrb}.`);
  if (t === 7) return cap(`I ${rng.pick(W.iverb)}. ${sub} ${vrb}.`);
  if (t === 8) return cap(`${sub} ${rng.pick(W.state)}. ${rng.pick(W.adv)}.`);
  if (t === 9) return cap(`${vrb}. ${rng.pick(W.adv)}.`);
  return m > 0.7 ? cap(`${adj}.`) : cap(`${sub} ${vrb}.`);
}

function genTitle(rng, m) {
  if (m < 0.12) {
    const SIMPLE = ['notes','beginning','starting','entry','record','log','here','day one','early'];
    const PRE    = ['first','early','an','a','some','one','this'];
    return rng.bool(0.55) ? rng.pick(SIMPLE) : `${rng.pick(PRE)} ${rng.pick(SIMPLE)}`;
  }
  if (m < 0.55) {
    const NOUNS = ['accumulation','process','progress','observations','additions',
                   'entries','notes','output','dispatch','record','work','things','update'];
    const PREPS = ['on','from','about','still','more','further','continued','ongoing','re:'];
    const t = rng.int(0, 3);
    if (t === 0) return rng.pick(NOUNS);
    if (t === 1) return `${rng.pick(PREPS)} ${rng.pick(NOUNS)}`;
    if (t === 2) return `${rng.pick(PREPS)} the ${rng.pick(NOUNS)}`;
    return rng.pick(PREPS);
  }
  const PHRASES = ['still','from deep in it','all of this','the weight of it',
                   'it keeps going','i have lost count','the long accumulation',
                   'from far in','what remains','heavy','at this point',
                   'this far in','the full record','it was different'];
  const NOUNS_L = ['weight','density','depth','accumulation','archive','mass'];
  return rng.bool(0.55) ? rng.pick(PHRASES) : `the ${rng.pick(NOUNS_L)}`;
}

const POST_TAGS = [
  'notes', 'log', 'ongoing', 'update', 'fragment',
  'observation', 'process', 'record', 'output', 'dispatch',
  'status', 'accumulation', 'thoughts', 'evidence', 'entry',
];

const NAV_LABELS = [
  'about','archive','notes','now','things',
  'more','journal','log','collected','here',
];

// ── Voices ────────────────────────────────────────────────────────────────────
const V = {
  early:   ['<!-- okay. -->','<!-- starting. -->','<!-- right. -->','<!-- let\'s see. -->','<!-- here. -->','<!-- going. -->','<!-- this is the start. -->'],
  mid:     ['<!-- i\'ve been here a while now. -->','<!-- getting somewhere. probably. -->','<!-- i notice things. -->','<!-- still going. -->','<!-- something is happening. -->','<!-- i keep adding. -->','<!-- time passes. obviously. -->','<!-- the accumulation is the point. maybe. -->'],
  late:    ['<!-- what is this becoming. -->','<!-- i don\'t remember starting. -->','<!-- it\'s just going now. -->','<!-- does this end? -->','<!-- there is a lot of it now. -->','<!-- i am still here. -->','<!-- i stopped counting. i didn\'t stop. -->','<!-- it was simpler at the start. -->'],
  ancient: ['<!-- . -->','<!-- still. -->','<!-- the weight of it. -->','<!-- i was here before you arrived. -->','<!-- it has been a long time. -->','<!-- i remember starting. barely. -->','<!-- always. -->','<!-- heavy. -->'],
};
function voice(i) {
  if (i > 400) return V.ancient;
  if (i < 20)  return V.early;
  if (i < 120) return V.mid;
  return V.late;
}

// ── Entry generation ──────────────────────────────────────────────────────────
function makePost(i, rng, m) {
  const title     = genTitle(rng, m);
  const paraCount = m < 0.2 ? rng.int(1, 2) : rng.int(1, 3);
  const paras     = Array.from({ length: paraCount }, () => {
    const sentCount = rng.int(2, 4);
    return Array.from({ length: sentCount }, () => genSentence(rng, m)).join(' ');
  });
  const tagCount = rng.int(1, 2);
  const seen = new Set();
  const tags = [];
  for (let k = 0; k < 8 && tags.length < tagCount; k++) {
    const t = rng.pick(POST_TAGS);
    if (!seen.has(t)) { seen.add(t); tags.push(t); }
  }
  return { i, type: 'post', title, paras, tags, date: entryDate(i), dateAttr: entryDateAttr(i) };
}

const NAV_RESERVED = ['about', 'archive', 'notes', 'now'];

function entry(i) {
  const rng = new RNG(i + 1);
  const m   = maturity(i);

  if (i === 0) return { i, type: 'hero' };
  if (i >= 1 && i <= 4) return { i, type: 'nav', label: NAV_RESERVED[i - 1] };

  const typePool = m < 0.12
    ? ['post', 'post', 'post', 'style', 'comment']
    : m < 0.45
    ? ['post', 'post', 'post', 'post', 'nav', 'style', 'comment']
    : ['post', 'post', 'post', 'comment', 'comment', 'style'];

  const type = rng.pick(typePool);

  if (type === 'post') return makePost(i, rng, m);

  if (type === 'nav') return { i, type: 'nav', label: rng.pick(NAV_LABELS) };

  if (type === 'style') {
    const hb  = (i * 13.7) % 360;
    const h   = ((hb + rng.f(-30, 30)) % 360 + 360) % 360;
    const s   = lerp(38, 12, m);
    const l   = lerp(52, 36, m);
    const col = `hsl(${h.toFixed(0)},${s.toFixed(0)}%,${l.toFixed(0)}%)`;
    return { i, type: 'style', col };
  }

  const line = new RNG(i + 9001).pick(voice(i));
  return { i, type: 'comment', line };
}

// ── Code text ─────────────────────────────────────────────────────────────────
function toCode(e) {
  if (e.type === 'hero') return (
    `<div class="site-intro">\n` +
    `  <h1>highcake.xyz</h1>\n` +
    `  <p class="tagline">a website that builds itself.\n  started may 2026.</p>\n` +
    `</div>\n`
  );
  if (e.type === 'nav') return `  <a href="#${e.label}">${e.label}</a>\n`;
  if (e.type === 'post') {
    const tagsStr  = e.tags.map(t => `<span class="post-tag">${t}</span>`).join(' ');
    const parasStr = e.paras.map(p => `    <p>${p}</p>`).join('\n');
    return (
      `\n<article class="post" id="post-${e.i}">\n` +
      `  <div class="post-meta">\n` +
      `    <time datetime="${e.dateAttr}">${e.date}</time>\n` +
      `    ${tagsStr}\n` +
      `  </div>\n` +
      `  <h2>${e.title}</h2>\n` +
      `  <div class="post-body">\n` +
      parasStr + `\n` +
      `  </div>\n` +
      `</article>\n`
    );
  }
  if (e.type === 'style') return `#built-site { --accent: ${e.col}; }\n`;
  if (e.type === 'comment') return `\n${e.line}\n`;
  return '';
}

function fileFor(e) { return e.type === 'style' ? 'style.css' : 'index.html'; }

// ── Tokeniser ─────────────────────────────────────────────────────────────────
function tokenise(code, mode) {
  const out = [];
  for (const line of code.split('\n')) {
    const t = line.trim();
    if (!t) { out.push({ t: '\n', c: '' }); continue; }

    if (mode === 'html') {
      if (t.startsWith('<!--')) {
        out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
      } else if (t.startsWith('</')) {
        out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
      } else if (t.startsWith('<')) {
        const m = t.match(/^<([a-z][a-z0-9]*)/i);
        if (m) {
          const indent = line.match(/^(\s*)/)[1];
          const after  = t.slice(m[0].length);
          out.push({ t: indent + '<', c: '' });
          out.push({ t: m[1], c: 'sel' });
          const gt = after.indexOf('>');
          if (gt !== -1) {
            if (gt > 0) out.push({ t: after.slice(0, gt), c: 'attr' });
            out.push({ t: '>', c: '' });
            if (after.slice(gt + 1)) out.push({ t: after.slice(gt + 1), c: 'val' });
          } else {
            out.push({ t: after, c: 'attr' });
          }
        } else {
          out.push({ t: line, c: '' });
        }
        out.push({ t: '\n', c: '' });
      } else {
        out.push({ t: line + '\n', c: 'val' });
      }
    } else {
      if (t.startsWith('/*') || t.startsWith('//')) {
        out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
      } else if (t.endsWith('{') || t === '}') {
        out.push({ t: line, c: 'sel' }, { t: '\n', c: '' });
      } else if (t.includes(':')) {
        const ci = line.indexOf(':');
        out.push({ t: line.slice(0, ci + 1), c: 'prop' });
        out.push({ t: line.slice(ci + 1), c: 'val' });
        out.push({ t: '\n', c: '' });
      } else {
        out.push({ t: line + '\n', c: '' });
      }
    }
  }
  return out;
}

// ── Blog base styles ──────────────────────────────────────────────────────────
const BASE_CSS = `

// ── Build site DOM ────────────────────────────────────────────────────────────
let siteMain, siteNav, dynStyles;

function initSite() {
  const root = document.getElementById('built-site');

  const style = document.createElement('style');
  style.textContent = BASE_CSS;
  root.appendChild(style);

  dynStyles = document.createElement('style');
  dynStyles.id = 'dyn-styles';
  root.appendChild(dynStyles);

  const header = document.createElement('header');
  header.id = 'site-header';
  header.innerHTML = `<nav id="site-nav"><a href="#" class="logo">highcake.xyz</a></nav>`;
  root.appendChild(header);
  siteNav = header.querySelector('#site-nav');

  const main = document.createElement('main');
  main.id = 'site-main';
  root.appendChild(main);
  siteMain = main;

  const footer = document.createElement('footer');
  footer.id = 'site-footer';
  footer.textContent = `highcake.xyz · building since may 2026`;
  root.appendChild(footer);
}

// ── Canvas render ─────────────────────────────────────────────────────────────
function renderEntry(e, instant) {
  const anim = !instant;

  if (e.type === 'hero') {
    const div = document.createElement('div');
    div.className = 'site-intro';
    div.innerHTML =
      `<h1>highcake.xyz</h1>` +
      `<p class="tagline">a website that builds itself.<br>started may 2026.</p>`;
    siteMain.appendChild(div);
    return;
  }

  if (e.type === 'nav') {
    const a = document.createElement('a');
    a.href = `#${e.label}`;
    a.textContent = e.label;
    if (anim) a.classList.add('site-entry');
    siteNav.appendChild(a);
    return;
  }

  if (e.type === 'post') {
    const art = document.createElement('article');
    art.className = 'post' + (anim ? ' site-entry' : '');
    art.id = `post-${e.i}`;

    const meta = document.createElement('div');
    meta.className = 'post-meta';
    const time = document.createElement('time');
    time.setAttribute('datetime', e.dateAttr);
    time.className = 'post-date';
    time.textContent = e.date;
    meta.appendChild(time);
    e.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'post-tag';
      span.textContent = tag;
      meta.appendChild(span);
    });
    art.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.textContent = e.title;
    art.appendChild(h2);

    const body = document.createElement('div');
    body.className = 'post-body';
    e.paras.forEach(p => {
      const el = document.createElement('p');
      el.textContent = p;
      body.appendChild(el);
    });
    art.appendChild(body);

    siteMain.appendChild(art);
    if (anim) scrollSite();
    return;
  }

  if (e.type === 'style') {
    dynStyles.textContent += `\n#built-site { --accent: ${e.col}; }\n`;
    return;
  }
  // comment: no DOM change
}

function scrollSite() {
  const site = document.getElementById('built-site');
  site.scrollTo({ top: site.scrollHeight, behavior: 'smooth' });
}

// ── Editor ────────────────────────────────────────────────────────────────────
const codePre  = document.getElementById('code-pre');
const edScroll = document.getElementById('ed-scroll');
const cursor   = codePre.querySelector('.cur');
const fileTab  = document.getElementById('file-tab');

function injectPast(code, mode) {
  const frag = document.createDocumentFragment();
  for (const { t, c } of tokenise(code, mode)) {
    if (c) { const s = document.createElement('span'); s.className = c; s.textContent = t; frag.appendChild(s); }
    else frag.appendChild(document.createTextNode(t));
  }
  codePre.insertBefore(frag, cursor);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function typeCode(code, mode) {
  fileTab.textContent = mode === 'css' ? 'style.css' : 'index.html';
  for (const { t, c } of tokenise(code, mode)) {
    let span = null;
    for (const ch of t) {
      if (!span) { span = document.createElement('span'); if (c) span.className = c; codePre.insertBefore(span, cursor); }
      span.textContent += ch;
      if (ch === '\n') span = null;
      edScroll.scrollTop = edScroll.scrollHeight;
      await sleep(Math.max(6, 42 + (Math.random() - 0.5) * 20));
    }
  }
}

// ── Age display ───────────────────────────────────────────────────────────────
function fmtAge(ms) {
  const m = Math.floor(ms / 60000), d = Math.floor(m / 1440), h = Math.floor((m % 1440) / 60), s = m % 60;
  if (d > 0) return `day ${d}, ${h}h ${s}m`;
  if (h > 0) return `${h}h ${s}m`;
  return `${s}m old`;
}
function updateMeta() {
  const idx = epochNow(), a = age();
  document.getElementById('age-badge').textContent = fmtAge(a);
  document.getElementById('status').textContent = `post ${idx} · ${fmtAge(a)}`;
}

// ── Toggle editor ─────────────────────────────────────────────────────────────
function toggleEditor() {
  const ed  = document.querySelector('.editor');
  const btn = document.getElementById('toggle-ed');
  btn.textContent = ed.classList.toggle('collapsed') ? '›' : '‹';
}

// ── Main ───────────────────────────────────────────────────────────────────────
async function main() {
  initSite();
  updateMeta();
  setInterval(updateMeta, 30_000);

  const cur   = epochNow();
  const prog  = progress();
  const limit = Math.min(cur, 8000);

  const past = [];
  for (let i = 0; i < limit; i++) past.push(entry(i));
  past.forEach(e => renderEntry(e, true));

  const CODE_HIST = 50;
  const slice     = past.slice(Math.max(0, past.length - CODE_HIST));
  let hdr = `<!-- highcake.xyz -->\n<!-- blog, ongoing -->\n<!-- building since may 2026 -->\n`;
  if (past.length > CODE_HIST) hdr += `\n<!-- ... ${past.length - CODE_HIST} entries before this ... -->\n`;
  injectPast(hdr + slice.map(e => toCode(e)).join(''), 'html');
  edScroll.scrollTop = edScroll.scrollHeight;

  let next = cur;
  while (true) {
    const e    = entry(next);
    const code = toCode(e);
    const mode = fileFor(e) === 'style.css' ? 'css' : 'html';

    if (next === cur && prog > 0) {
      const done = Math.floor(prog * code.length);
      if (done > 0) injectPast(code.slice(0, done), mode);
      await typeCode(code.slice(done), mode);
    } else {
      await typeCode(code, mode);
    }

    renderEntry(e, false);
    next++;
    await sleep(800 + Math.random() * 400);
  }
}

// ── Share ─────────────────────────────────────────────────────────────────────
function share() {
  navigator.clipboard.writeText(location.href).then(() => {
    const b = document.getElementById('btn-share');
    b.textContent = 'copied.'; b.classList.add('ok');
    setTimeout(() => { b.textContent = 'share'; b.classList.remove('ok'); }, 2000);
  });
}

main();
</script>
