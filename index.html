<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>highcake.xyz</title>
  <meta name="description" content="it has been building since may 2026.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #090909; }

    #built-site {
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    #built-site::-webkit-scrollbar { width: 4px; }
    #built-site::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

    .site-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 8px 20px;
      background: rgba(9,9,9,0.92);
      backdrop-filter: blur(6px);
      border-top: 1px solid #141414;
      display: flex; align-items: center; justify-content: space-between;
    }
    .status { font-size: 10px; color: #2a2a2a; font-family: 'SF Mono','Fira Code',monospace; letter-spacing: 0.06em; }
    .bar-btns { display: flex; gap: 8px; align-items: center; }
    .btn-bar {
      font-size: 10px; color: #333; background: none;
      border: 1px solid #1e1e1e; padding: 4px 10px; border-radius: 3px;
      cursor: pointer; font-family: 'SF Mono','Fira Code',monospace;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-bar:hover { color: #666; border-color: #333; }
    .btn-bar.ok  { color: #4ade80; border-color: #4ade80; }
  </style>
</head>
<body>

<div id="built-site"></div>
<div class="site-bar">
  <span class="status" id="status"></span>
  <div class="bar-btns">
    <button class="btn-bar" id="btn-share" onclick="window._share()">share</button>
  </div>
</div>

<script>
// ── RNG ───────────────────────────────────────────────────────────────────────
class RNG {
  constructor(seed) { this.s = (seed ^ 0x9e3779b9) >>> 0 || 1; }
  next() { this.s ^= this.s << 13; this.s ^= this.s >> 17; this.s ^= this.s << 5; return (this.s >>> 0) / 0xffffffff; }
  pick(a)       { return a[Math.floor(this.next() * a.length)]; }
  int(a, b)     { return Math.floor(this.next() * (b - a + 1)) + a; }
  f(a, b)       { return this.next() * (b - a) + a; }
  bool(p = 0.5) { return this.next() < p; }
}

// ── Timing ────────────────────────────────────────────────────────────────────
const lerp     = (a, b, t) => a + (b - a) * t;
const maturity = i => Math.min(1, i / 1000);
const BIRTHDAY = new Date('2026-05-21T10:00:00Z').getTime();
const EPOCH    = 3 * 60 * 1000;
function age()      { return Date.now() - BIRTHDAY; }
function epochNow() { return Math.floor(age() / EPOCH); }

function entryDate(i) {
  const d = new Date(BIRTHDAY + i * EPOCH);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function entryDateAttr(i) {
  const d = new Date(BIRTHDAY + i * EPOCH);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Fallback content pools ────────────────────────────────────────────────────
const TITLES = {
  early: ['notes','starting','day one','first entry','here','beginning','an entry','okay','a record','early','a start','something','first notes','initial','hello'],
  mid:   ['accumulation','update','still going','progress','observations','it has been a while','ongoing','building','dispatch','from the middle','further along','the process','more of this','deeper in','a few things','report','in progress','current state','checkpoint','still here'],
  late:  ['the weight of it','still','from far in','all of this','density','heavy','it keeps going','what it became','the long accumulation','what remains','at this point','this far in','the full record','irreversible','the archive','the whole of it','mass','still going','deep in','after all this','duration'],
};

const PARAS = {
  early: [
    "This is the start. I don't know yet what it will become.",
    "I made this today. There isn't much here yet.",
    "Something needed to exist here, so I made something.",
    "I set this up because I wanted to build something that keeps going. That's still the reason.",
    "The first entries are always the strangest. You're making something with no sense of its own future.",
    "Not sure what this is yet. I'll keep adding to it and find out.",
    "It exists now. That counts for something.",
    "I built this and now I'm watching it grow. That's the whole plan.",
    "Starting is the hard part, so I just did it.",
    "I wanted a place that built itself. So I made one.",
    "Empty at first. That changes.",
    "The beginning of something feels light. There's nothing to carry yet.",
    "Every three minutes this site adds a new entry. This is one of the first.",
    "A record of the thing existing. That's enough for now.",
    "I don't have a finished version of this in mind. That's intentional.",
    "Small at first. That changes.",
    "I built this because I didn't want to build something that was ever finished. Here's the start of that.",
    "No plan beyond: keep going. That might be enough.",
  ],
  mid: [
    "There are more entries now than I expected. I keep checking back and something new is always here. That was the plan but it still surprises me.",
    "The site has a shape now. Not a finished shape, but you can see the outline of what it's becoming.",
    "Something changed around the fortieth or fiftieth entry. I can't point to exactly what. It just started feeling like a real thing.",
    "I've been watching this build for a couple of days. The early entries look different from here — smaller, more tentative, like they didn't know what came after.",
    "It keeps going whether I'm actively thinking about it or not. That's either the best part or the strangest part.",
    "I scroll back sometimes and count. More than I thought. Less than I expected.",
    "The pattern is clearer from the middle than from the start. You can't see something properly while you're still figuring out what it is.",
    "This is what persistence looks like when you strip everything else away. Just the accumulation.",
    "I didn't plan this exactly. I planned something and this is what happened. That seems fine.",
    "Every entry adds to the total weight of the thing. At some point that weight becomes the point.",
    "It was much simpler at the start. Not worse — just smaller, like it hadn't grown into itself yet.",
    "I like that it doesn't stop. Most things have endings built in. This one doesn't.",
    "The archive grows. That's all it does. That turns out to be enough.",
    "There's something satisfying about a thing that just keeps adding to itself. No drama. No conclusion.",
    "Someone asked me what this is. I said it's a website that grows. They asked grows into what. I said I don't know yet. That was the honest answer.",
    "The entries stack up. You stop noticing each one individually and start seeing the whole mass of them.",
    "Every three minutes. Whether I'm here or not. The site adds an entry and moves on.",
    "I built this to outlast my attention span. That was a real concern. It worked.",
    "There's more of it than there used to be. That simple fact is kind of the whole point.",
    "I made this to test whether something could grow without needing constant attention. The answer so far is yes.",
  ],
  late: [
    "I don't remember what it looked like at the start anymore. I'd have to scroll all the way back. I haven't.",
    "There's too much of it now to hold in your head at once. That's either a problem or the point. I've decided it's the point.",
    "It has been a long time. The site keeps building whether I'm paying attention or not. That used to feel strange. Now it just feels true.",
    "The early entries are somewhere in the archive. They look like a different version of the project.",
    "At this depth you stop thinking about what it means and start thinking about what it is. It's a lot of entries. It keeps going.",
    "Heavy now. In the way that things get heavy when they've been somewhere a long time.",
    "I still check in on it. I always will. It's become part of how I keep time.",
    "The accumulation is the work. I understood that early but I understand it differently now.",
    "Things that started as experiments become facts through sheer duration.",
    "I started this and kept going and now I can't really imagine not having started it.",
    "The weight of the archive isn't sad. It's just substantial. There's a difference.",
    "Every entry is the same size. A fixed interval of time, over and over, stacking into something irreversible.",
    "I was here at the beginning. I'll be here at whatever comes next.",
    "Something about very long-running things changes what they are. They stop being projects and become facts.",
    "Still going. That's the whole sentence.",
    "I don't think about the end of it. There isn't one, by design.",
    "The site outlasts moods. Outlasts doubt. That's the advantage of automation — it doesn't need to feel motivated.",
    "Dense now. That happened so gradually I didn't notice until it was already true.",
    "I built a record and the record built something back. I'm not sure exactly what. Something is here.",
    "It keeps going. I keep going. We have an understanding.",
    "The count is high enough now that it feels abstract. Which is its own kind of success.",
  ],
};

const POST_TAGS = ['notes','log','ongoing','update','fragment','observation','process','record','output','dispatch','status','accumulation','thoughts','evidence','entry'];
const NAV_LABELS = ['about','archive','notes','now','things','more','journal','log','collected','here'];
const NAV_RESERVED = ['about','archive','notes','now'];

function makeFallbackPost(i, rng, m) {
  const tier  = m < 0.15 ? 'early' : m < 0.55 ? 'mid' : 'late';
  const title = rng.pick(TITLES[tier]);
  const paraCount = m < 0.15 ? rng.int(1, 2) : rng.int(1, 3);
  const paras = [];
  const used  = new Set();
  for (let p = 0; p < paraCount; p++) {
    let pool;
    if      (m < 0.15) pool = PARAS.early;
    else if (m < 0.4)  pool = rng.bool(0.8) ? PARAS.mid : PARAS.early;
    else if (m < 0.55) pool = PARAS.mid;
    else if (m < 0.75) pool = rng.bool(0.75) ? PARAS.late : PARAS.mid;
    else               pool = PARAS.late;
    let para, tries = 0;
    do { para = rng.pick(pool); tries++; } while (used.has(para) && tries < 8);
    used.add(para);
    paras.push(para);
  }
  const tagCount = rng.int(1, 2);
  const seen = new Set(); const tags = [];
  for (let k = 0; k < 8 && tags.length < tagCount; k++) {
    const t = rng.pick(POST_TAGS);
    if (!seen.has(t)) { seen.add(t); tags.push(t); }
  }
  return { i, type: 'post', title, paras, tags, date: entryDate(i), dateAttr: entryDateAttr(i) };
}

function entry(i) {
  const rng = new RNG(i + 1);
  const m   = maturity(i);
  if (i === 0) return { i, type: 'hero' };
  if (i >= 1 && i <= 4) return { i, type: 'nav', label: NAV_RESERVED[i - 1] };
  const typePool = m < 0.12
    ? ['post','post','post','style','comment']
    : m < 0.45
    ? ['post','post','post','post','nav','style','comment']
    : ['post','post','post','comment','comment','style'];
  const type = rng.pick(typePool);
  if (type === 'post') return makeFallbackPost(i, rng, m);
  if (type === 'nav')  return { i, type: 'nav', label: rng.pick(NAV_LABELS) };
  if (type === 'style') {
    const hb = (i * 13.7) % 360;
    const h  = ((hb + rng.f(-30, 30)) % 360 + 360) % 360;
    return { i, type: 'style', col: `hsl(${h.toFixed(0)},${lerp(38,12,m).toFixed(0)}%,${lerp(52,36,m).toFixed(0)}%)` };
  }
  const VOICES = {
    early:   ['<!-- okay. -->','<!-- starting. -->','<!-- here. -->','<!-- going. -->','<!-- beginning now. -->'],
    mid:     ['<!-- still going. -->','<!-- something is happening. -->','<!-- i keep adding. -->','<!-- time passes. obviously. -->','<!-- it keeps building. -->'],
    late:    ['<!-- what is this becoming. -->','<!-- there is a lot of it now. -->','<!-- it was simpler at the start. -->','<!-- heavy. -->'],
    ancient: ['<!-- . -->','<!-- still. -->','<!-- the weight of it. -->','<!-- it has been a long time. -->','<!-- irreversible. -->'],
  };
  const pool = i > 400 ? VOICES.ancient : i < 20 ? VOICES.early : i < 120 ? VOICES.mid : VOICES.late;
  return { i, type: 'comment', line: new RNG(i + 9001).pick(pool) };
}

// ── AI via Cloudflare Worker ──────────────────────────────────────────────────
const WORKER_URL = 'https://highcake.maxschuler.workers.dev';
const aiReady    = !!WORKER_URL;

async function getAIEntry(i) {
  const rng = new RNG(i + 1);
  const m   = maturity(i);
  if (aiReady) {
    try {
      const res = await fetch(`${WORKER_URL}?i=${i}`);
      if (!res.ok) throw new Error(`worker ${res.status}`);
      const e = await res.json();
      if (e.type === 'post') { e.date = entryDate(i); e.dateAttr = entryDateAttr(i); }
      return e;
    } catch (_) { /* fall through */ }
  }
  return makeFallbackPost(i, rng, m);
}

// ── Blog styles ───────────────────────────────────────────────────────────────
const BASE_CSS = `
  #built-site {
    --accent: #7c7c7c; --border: #1a1a1a; --text: #c4c4c4; --muted: #555; --bg: #0c0c0c;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100%;
    font-size: 16px; line-height: 1.7; padding-bottom: 48px;
  }
  #site-header {
    padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(12,12,12,0.95);
    backdrop-filter: blur(8px); z-index: 100;
  }
  #site-nav {
    display: flex; gap: 1.5rem; align-items: center;
    flex-wrap: wrap; max-width: 720px; margin: 0 auto;
  }
  #site-nav a { text-decoration: none; color: var(--muted); font-size: 13px; transition: color 0.15s; }
  #site-nav a:hover { color: var(--text); }
  #site-nav .logo { color: var(--text); font-weight: 600; font-size: 14px; }
  #site-main { max-width: 680px; margin: 0 auto; padding: 0 2rem 6rem; }
  .site-intro { padding: 5rem 0 3.5rem; border-bottom: 1px solid var(--border); }
  .site-intro h1 {
    font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 800;
    letter-spacing: -0.04em; color: #f0f0f0; margin-bottom: 0.8rem; line-height: 1.1;
  }
  .site-intro .tagline { color: #444; font-size: 13px; max-width: 40ch; line-height: 1.6; }
  article.post { padding: 2.8rem 0; border-top: 1px solid var(--border); }
  .post-meta { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
  time.post-date { font-size: 11px; color: #3a3a3a; font-family: 'SF Mono','Fira Code',monospace; letter-spacing: 0.04em; }
  .post-tag { font-size: 10px; color: #2e2e2e; border: 1px solid #222; padding: 1px 7px; border-radius: 2px; font-family: monospace; letter-spacing: 0.04em; }
  article.post h2 { font-size: clamp(1.1rem,3vw,1.45rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.25; color: #ddd; margin-bottom: 1rem; }
  .post-body p { color: var(--text); font-size: 15px; line-height: 1.8; margin-bottom: 0.7rem; max-width: 58ch; }
  #site-footer { padding: 3rem 2rem; border-top: 1px solid var(--border); text-align: center; color: #222; font-size: 11px; font-family: monospace; letter-spacing: 0.06em; }
  .site-entry { animation: fadeIn 0.7s ease forwards; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
`;

// ── DOM ───────────────────────────────────────────────────────────────────────
let siteMain, siteNav, dynStyles;

function initSite() {
  const root = document.getElementById('built-site');
  const style = document.createElement('style');
  style.textContent = BASE_CSS;
  root.appendChild(style);
  dynStyles = document.createElement('style');
  root.appendChild(dynStyles);
  const header = document.createElement('header');
  header.id = 'site-header';
  header.innerHTML = `<nav id="site-nav"><a href="#" class="logo">highcake.xyz</a></nav>`;
  root.appendChild(header);
  siteNav = header.querySelector('#site-nav');
  const main = document.createElement('main');
  main.id = 'site-main';
  root.appendChild(main);
  siteMain = main;
  const footer = document.createElement('footer');
  footer.id = 'site-footer';
  footer.textContent = `highcake.xyz · building since may 21, 2026`;
  root.appendChild(footer);
}

function renderEntry(e, instant) {
  const anim = !instant;
  if (e.type === 'hero') {
    const div = document.createElement('div');
    div.className = 'site-intro';
    div.innerHTML = `<h1>highcake.xyz</h1><p class="tagline">a website that builds itself.<br>started may 21, 2026.</p>`;
    siteMain.appendChild(div);
    return;
  }
  if (e.type === 'nav') {
    const a = document.createElement('a');
    a.href = `#${e.label}`; a.textContent = e.label;
    siteNav.appendChild(a);
    return;
  }
  if (e.type === 'post') {
    const art = document.createElement('article');
    art.className = 'post' + (anim ? ' site-entry' : '');
    art.id = `post-${e.i}`;
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    const time = document.createElement('time');
    time.setAttribute('datetime', e.dateAttr);
    time.className = 'post-date';
    time.textContent = e.date;
    meta.appendChild(time);
    e.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'post-tag'; span.textContent = tag;
      meta.appendChild(span);
    });
    art.appendChild(meta);
    const h2 = document.createElement('h2');
    h2.textContent = e.title;
    art.appendChild(h2);
    const body = document.createElement('div');
    body.className = 'post-body';
    e.paras.forEach(p => {
      const el = document.createElement('p'); el.textContent = p;
      body.appendChild(el);
    });
    art.appendChild(body);
    const intro = siteMain.querySelector('.site-intro');
    intro ? intro.after(art) : siteMain.prepend(art);
    if (anim) document.getElementById('built-site').scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  if (e.type === 'style') { dynStyles.textContent += `\n#built-site { --accent: ${e.col}; }\n`; return; }
  if (e.type === 'ai_css') { dynStyles.textContent += `\n/* ${e.i} */\n${e.rules}\n`; return; }
  if (e.type === 'ai_html') {
    const wrap = document.createElement('div');
    if (anim) wrap.className = 'site-entry';
    wrap.innerHTML = e.html;
    const intro = siteMain.querySelector('.site-intro');
    intro ? intro.after(wrap) : siteMain.prepend(wrap);
    if (anim) document.getElementById('built-site').scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
}

// ── Meta ──────────────────────────────────────────────────────────────────────
function fmtAge(ms) {
  const m = Math.floor(ms/60000), d = Math.floor(m/1440), h = Math.floor((m%1440)/60), s = m%60;
  if (d > 0) return `day ${d}, ${h}h ${s}m`;
  if (h > 0) return `${h}h ${s}m`;
  return `${s}m old`;
}
function updateMeta() {
  document.getElementById('status').textContent = `post ${epochNow()} · ${fmtAge(age())}`;
}

// ── Upgrade recent fallback posts to AI versions ───────────────────────────
async function upgradeRecentAI(limit) {
  const RECENT = 25;
  const start  = Math.max(0, limit - RECENT + 1);
  const slots  = [];
  for (let i = start; i <= limit; i++) {
    if (entry(i).type === 'post') slots.push(i);
  }
  const results = await Promise.allSettled(slots.map(i => getAIEntry(i)));
  results.forEach((r, idx) => {
    if (r.status !== 'fulfilled') return;
    const e = r.value;
    const i = slots[idx];
    if (e.type === 'post') {
      const el = document.getElementById('post-' + i);
      if (!el) return;
      el.querySelector('h2').textContent = e.title;
      const body = el.querySelector('.post-body');
      body.innerHTML = '';
      e.paras.forEach(p => { const pe = document.createElement('p'); pe.textContent = p; body.appendChild(pe); });
      el.querySelectorAll('.post-tag').forEach(t => t.remove());
      const meta = el.querySelector('.post-meta');
      e.tags.forEach(tag => { const s = document.createElement('span'); s.className = 'post-tag'; s.textContent = tag; meta.appendChild(s); });
    } else if (e.type === 'ai_css') {
      const el = document.getElementById('post-' + i);
      if (el) el.remove();
      dynStyles.textContent += '\n/* ' + i + ' */\n' + e.rules + '\n';
    } else if (e.type === 'ai_html') {
      const el = document.getElementById('post-' + i);
      if (!el) return;
      const wrap = document.createElement('div');
      wrap.innerHTML = e.html;
      el.replaceWith(wrap);
    }
  });
}

// ── Main ──────────────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function main() {
  initSite();
  updateMeta();
  setInterval(updateMeta, 30_000);

  const cur   = epochNow();
  const limit = Math.min(cur, 8000);
  for (let i = 0; i <= limit; i++) renderEntry(entry(i), true);

  // Quietly upgrade recent fallback posts with AI versions from KV
  upgradeRecentAI(limit);

  let next = limit + 1;
  while (true) {
    const wait = BIRTHDAY + next * EPOCH - Date.now();
    if (wait > 0) await sleep(wait);
    const e = entry(next);
    if (e.type === 'post') {
      renderEntry(await getAIEntry(next), false);
    } else {
      renderEntry(e, false);
    }
    next++;
  }
}

window._share = () => {
  navigator.clipboard.writeText(location.href).then(() => {
    const b = document.getElementById('btn-share');
    b.textContent = 'copied.'; b.classList.add('ok');
    setTimeout(() => { b.textContent = 'share'; b.classList.remove('ok'); }, 2000);
  });
};

main();
</script>
</body>
</html>
