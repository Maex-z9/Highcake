<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>highcake.xyz</title>
  <meta name="description" content="it has been building since may 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#070709; --text:#ddd8cc; --muted:#4a4535; --gold:#9b7d45; --gold-hi:#c8952a; --border:#1c1a14; }
    html { background:var(--bg); }
    body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; font-size:13px; line-height:1.75; }
    #scroll { height:100vh; overflow-y:auto; overflow-x:hidden; scroll-behavior:smooth; }
    #scroll::-webkit-scrollbar { width:3px; }
    #scroll::-webkit-scrollbar-thumb { background:#1a1810; }
    #site { max-width:680px; margin:0 auto; padding:0 2rem 8rem; }
    #site-head { padding:4rem 0 2.5rem; border-bottom:1px solid var(--border); display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0; }
    .wordmark { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--text); }
    .wordmark-sub { font-size:9px; color:var(--muted); letter-spacing:0.1em; }
    #site-intro { padding:5rem 0 4rem; border-bottom:1px solid var(--border); }
    #site-intro h1 { font-family:'Crimson Pro',serif; font-size:clamp(2.4rem,6vw,3.2rem); font-weight:600; line-height:1.06; letter-spacing:-0.02em; color:var(--text); margin-bottom:1.4rem; }
    #site-intro p { font-size:10px; color:var(--muted); letter-spacing:0.06em; line-height:1.9; }
    .entry { padding:3.5rem 0; border-bottom:1px solid var(--border); }
    .entry-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0.9rem; }
    .entry-idx { font-size:9px; color:var(--muted); letter-spacing:0.12em; }
    .entry-date { font-size:9px; color:var(--gold); letter-spacing:0.08em; }
    .entry-title { font-family:'Crimson Pro',serif; font-size:2rem; font-weight:600; line-height:1.12; letter-spacing:-0.01em; color:var(--text); margin-bottom:1rem; transition:color 0.3s; }
    .entry:hover .entry-title { color:#f0ead8; }
    .entry-rule { width:2rem; height:1px; background:var(--border); margin-bottom:0.9rem; transition:width 0.4s ease, background 0.4s ease; }
    .entry:hover .entry-rule { width:4rem; background:var(--gold); }
    .entry-tags { display:flex; gap:0.6rem; margin-bottom:1.2rem; flex-wrap:wrap; }
    .entry-tag { font-size:9px; color:var(--muted); letter-spacing:0.08em; border:1px solid var(--border); padding:1px 6px; }
    .entry-body p { font-size:12.5px; color:#7a7465; line-height:1.9; max-width:55ch; margin-bottom:0.6rem; }
    .entry.is-new .entry-title { color:#f0ead8; }
    .entry.is-new .entry-body p { color:#a09880; }
    .entry.is-new .entry-date { color:var(--gold-hi); }
    .entry-comment { padding:2rem 0; border-bottom:1px solid var(--border); text-align:center; }
    .entry-comment span { font-size:10px; color:#252215; letter-spacing:0.1em; font-style:italic; }
    .animate-in { animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }
    #status-bar { position:fixed; bottom:0; left:0; right:0; padding:9px 2rem; background:rgba(7,7,9,0.96); backdrop-filter:blur(6px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .status-left { display:flex; align-items:center; gap:10px; }
    .status-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); animation:breathe 4s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
    .status-text { font-size:10px; color:var(--muted); letter-spacing:0.06em; }
    .btn-share { font-size:10px; color:var(--muted); background:none; border:1px solid var(--border); padding:3px 10px; cursor:pointer; font-family:'Space Mono',monospace; letter-spacing:0.06em; transition:color 0.15s,border-color 0.15s; }
    .btn-share:hover { color:var(--text); border-color:var(--muted); }
    .btn-share.ok { color:var(--gold); border-color:var(--gold); }
    @media(max-width:640px) { #site{padding:0 1.2rem 8rem} #site-head{padding:2.5rem 0 2rem} #site-intro{padding:3rem 0 2.5rem} #site-intro h1{font-size:2rem} .entry{padding:2.5rem 0} .entry-title{font-size:1.6rem} #status-bar{padding:9px 1.2rem} }
  </style>
</head>
<body>

<style id="dyn-styles"></style>

<script>
// ── RNG ───────────────────────────────────────────────────────────────────────
class RNG {
  constructor(seed) { this.s = (seed ^ 0x9e3779b9) >>> 0 || 1; }
  next() { this.s ^= this.s << 13; this.s ^= this.s >> 17; this.s ^= this.s << 5; return (this.s >>> 0) / 0xffffffff; }
  pick(a)   { return a[Math.floor(this.next() * a.length)]; }
  int(a, b) { return Math.floor(this.next() * (b - a + 1)) + a; }
  f(a, b)   { return this.next() * (b - a) + a; }
  bool(p)   { if (p === undefined) p = 0.5; return this.next() < p; }
}

// ── Timing ────────────────────────────────────────────────────────────────────
var lerp     = function(a, b, t) { return a + (b - a) * t; };
var maturity = function(i) { return Math.min(1, i / 1000); };
var BIRTHDAY = new Date('2026-05-28T12:00:00Z').getTime();

function entryInterval(i) {
  var rng = new RNG(i * 6271 + 98317);
  if (rng.next() < 0.3) return rng.int(5, 30) * 1000;
  return rng.int(60, 480) * 1000;
}

var _ts = [BIRTHDAY];
function entryTimestamp(i) {
  while (_ts.length <= i) _ts.push(_ts[_ts.length - 1] + entryInterval(_ts.length - 1));
  return _ts[i];
}

function epochNow() {
  var now = Date.now();
  var i = 0;
  while (entryTimestamp(i + 1) <= now && i < 10000) i++;
  return i;
}

function entryDate(i) {
  var d = new Date(entryTimestamp(i));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function entryDateAttr(i) {
  var d = new Date(entryTimestamp(i));
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ── Content pools ─────────────────────────────────────────────────────────────
var TITLES = {
  early: ['notes','starting','day one','first entry','here','beginning','an entry','okay','a record','early','a start','something','first notes','initial','hello'],
  mid:   ['accumulation','update','still going','progress','observations','it has been a while','ongoing','building','dispatch','from the middle','further along','the process','more of this','deeper in','a few things','report','in progress','current state','checkpoint','still here'],
  late:  ['the weight of it','still','from far in','all of this','density','heavy','it keeps going','what it became','the long accumulation','what remains','at this point','this far in','the full record','irreversible','the archive','the whole of it','mass','still going','deep in','after all this','duration'],
};

var PARAS = {
  early: [
    "This is the start. I don't know yet what it will become.",
    "I made this today. There isn't much here yet.",
    "Something needed to exist here, so I made something.",
    "I set this up because I wanted to build something that keeps going. That's still the reason.",
    "The first entries are always the strangest. You're making something with no sense of its own future.",
    "Not sure what this is yet. I'll keep adding to it and find out.",
    "It exists now. That counts for something.",
    "I built this and now I'm watching it grow. That's the whole plan.",
    "Starting is the hard part, so I just did it.",
    "I wanted a place that built itself. So I made one.",
    "Empty at first. That changes.",
    "The beginning of something feels light. There's nothing to carry yet.",
    "Every three minutes this site adds a new entry. This is one of the first.",
    "A record of the thing existing. That's enough for now.",
    "I don't have a finished version of this in mind. That's intentional.",
  ],
  mid: [
    "There are more entries now than I expected. I keep checking back and something new is always here. That was the plan but it still surprises me.",
    "The site has a shape now. Not a finished shape, but you can see the outline of what it's becoming.",
    "Something changed around the fortieth or fiftieth entry. I can't point to exactly what. It just started feeling like a real thing.",
    "I've been watching this build for a couple of days. The early entries look different from here — smaller, more tentative, like they didn't know what came after.",
    "It keeps going whether I'm actively thinking about it or not. That's either the best part or the strangest part.",
    "I scroll back sometimes and count. More than I thought. Less than I expected.",
    "The pattern is clearer from the middle than from the start. You can't see something properly while you're still figuring out what it is.",
    "This is what persistence looks like when you strip everything else away. Just the accumulation.",
    "I didn't plan this exactly. I planned something and this is what happened. That seems fine.",
    "Every entry adds to the total weight of the thing. At some point that weight becomes the point.",
    "It was much simpler at the start. Not worse — just smaller, like it hadn't grown into itself yet.",
    "I like that it doesn't stop. Most things have endings built in. This one doesn't.",
    "The archive grows. That's all it does. That turns out to be enough.",
    "There's something satisfying about a thing that just keeps adding to itself. No drama. No conclusion.",
    "Someone asked me what this is. I said it's a website that grows. They asked grows into what. I said I don't know yet. That was the honest answer.",
  ],
  late: [
    "I don't remember what it looked like at the start anymore. I'd have to scroll all the way back. I haven't.",
    "There's too much of it now to hold in your head at once. That's either a problem or the point. I've decided it's the point.",
    "It has been a long time. The site keeps building whether I'm paying attention or not. That used to feel strange. Now it just feels true.",
    "The early entries are somewhere in the archive. They look like a different version of the project.",
    "At this depth you stop thinking about what it means and start thinking about what it is. It's a lot of entries. It keeps going.",
    "Heavy now. In the way that things get heavy when they've been somewhere a long time.",
    "I still check in on it. I always will. It's become part of how I keep time.",
    "The accumulation is the work. I understood that early but I understand it differently now.",
    "Things that started as experiments become facts through sheer duration.",
    "I started this and kept going and now I can't really imagine not having started it.",
    "The weight of the archive isn't sad. It's just substantial. There's a difference.",
    "Every entry is the same size. A fixed interval of time, over and over, stacking into something irreversible.",
    "I was here at the beginning. I'll be here at whatever comes next.",
    "Something about very long-running things changes what they are. They stop being projects and become facts.",
    "Still going. That's the whole sentence.",
  ],
};

var POST_TAGS = ['notes','log','ongoing','update','fragment','observation','process','record','output','dispatch','status','accumulation','thoughts','evidence','entry'];

var VOICES = {
  early:   ['okay.','starting.','here.','going.','beginning now.'],
  mid:     ['still going.','something is happening.','i keep adding.','time passes. obviously.','it keeps building.'],
  late:    ['what is this becoming.','there is a lot of it now.','it was simpler at the start.','heavy.'],
  ancient: ['.','still.','the weight of it.','it has been a long time.','irreversible.'],
};

function makeFallbackPost(i, rng, m) {
  var tier  = m < 0.15 ? 'early' : m < 0.55 ? 'mid' : 'late';
  var title = rng.pick(TITLES[tier]);
  var paraCount = m < 0.15 ? rng.int(1, 2) : rng.int(1, 3);
  var paras = [];
  var used  = {};
  for (var p = 0; p < paraCount; p++) {
    var pool;
    if      (m < 0.15) pool = PARAS.early;
    else if (m < 0.4)  pool = rng.bool(0.8) ? PARAS.mid : PARAS.early;
    else if (m < 0.55) pool = PARAS.mid;
    else if (m < 0.75) pool = rng.bool(0.75) ? PARAS.late : PARAS.mid;
    else               pool = PARAS.late;
    var para, tries = 0;
    do { para = rng.pick(pool); tries++; } while (used[para] && tries < 8);
    used[para] = true;
    paras.push(para);
  }
  var tagCount = rng.int(1, 2);
  var seen = {}; var tags = [];
  for (var k = 0; k < 8 && tags.length < tagCount; k++) {
    var t = rng.pick(POST_TAGS);
    if (!seen[t]) { seen[t] = true; tags.push(t); }
  }
  return { i: i, type: 'post', title: title, paras: paras, tags: tags, date: entryDate(i), dateAttr: entryDateAttr(i) };
}

function entry(i) {
  var rng = new RNG(i + 1);
  var m   = maturity(i);
  if (i === 0) return { i: i, type: 'hero' };
  var typePool = m < 0.12
    ? ['post','post','post','style','comment']
    : m < 0.45
    ? ['post','post','post','post','style','comment']
    : ['post','post','post','comment','comment','style'];
  var type = rng.pick(typePool);
  if (type === 'post') return makeFallbackPost(i, rng, m);
  if (type === 'style') {
    var hb = (i * 13.7) % 360;
    var h  = ((hb + rng.f(-30, 30)) % 360 + 360) % 360;
    return { i: i, type: 'style', col: 'hsl(' + h.toFixed(0) + ',' + lerp(38,12,m).toFixed(0) + '%,' + lerp(52,36,m).toFixed(0) + '%)' };
  }
  var pool = i > 400 ? VOICES.ancient : i < 20 ? VOICES.early : i < 120 ? VOICES.mid : VOICES.late;
  return { i: i, type: 'comment', line: new RNG(i + 9001).pick(pool) };
}

// ── AI via Cloudflare Worker ──────────────────────────────────────────────────
var WORKER_URL = 'https://highcake.maxschuler.workers.dev';

async function getAIEntry(i) {
  var rng = new RNG(i + 1);
  var m   = maturity(i);
  try {
    var res = await fetch(WORKER_URL + '?i=' + i);
    if (!res.ok) throw new Error('worker ' + res.status);
    var e = await res.json();
    if (e.type === 'post') { e.date = entryDate(i); e.dateAttr = entryDateAttr(i); }
    return e;
  } catch (_) { /* fall through */ }
  return makeFallbackPost(i, rng, m);
}

// ── Upgrade recent fallback posts to AI versions ──────────────────────────────
async function upgradeRecentAI(limit) {
  var RECENT = 20;
  var start  = Math.max(0, limit - RECENT + 1);
  var slots  = [];
  for (var i = start; i <= limit; i++) {
    if (entry(i).type === 'post') slots.push(i);
  }
  var results = await Promise.allSettled(slots.map(function(idx) { return getAIEntry(idx); }));
  results.forEach(function(r, pos) {
    if (r.status !== 'fulfilled') return;
    var e = r.value;
    var i = slots[pos];
    if (e.type !== 'post' && e.type !== 'ai_css' && e.type !== 'ai_html') return;
    if (e.type === 'post') {
      var el = document.getElementById('entry-' + i);
      if (!el) return;
      el.querySelector('.entry-title').textContent = e.title;
      var body = el.querySelector('.entry-body');
      body.innerHTML = '';
      e.paras.forEach(function(p) {
        var pe = document.createElement('p');
        pe.textContent = p;
        body.appendChild(pe);
      });
      el.querySelectorAll('.entry-tag').forEach(function(t) { t.remove(); });
      var tagsEl = el.querySelector('.entry-tags');
      e.tags.forEach(function(tag) {
        var s = document.createElement('span');
        s.className = 'entry-tag';
        s.textContent = tag;
        tagsEl.appendChild(s);
      });
    }
    // skip css/html types in upgrade pass
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
var feed;
var dynStyles;

function zeroPad(n) {
  return n < 10 ? '0' + n : '' + n;
}

function renderEntry(e, animate) {
  if (e.type === 'hero') return; // handled in initSite

  if (e.type === 'style') {
    dynStyles.textContent += ':root { --gold: ' + e.col + '; }\n';
    return;
  }

  if (e.type === 'ai_css') {
    dynStyles.textContent += e.rules + '\n';
    return;
  }

  if (e.type === 'ai_html') {
    var wrap = document.createElement('div');
    var cleaned = e.html
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/\s+on\w+="[^"]*"/gi, '')
      .replace(/\s+on\w+='[^']*'/gi, '');
    wrap.innerHTML = cleaned;
    if (animate) wrap.classList.add('animate-in');
    feed.prepend(wrap);
    return;
  }

  if (e.type === 'comment') {
    var cdiv = document.createElement('div');
    cdiv.className = 'entry-comment';
    var cspan = document.createElement('span');
    cspan.textContent = e.line;
    cdiv.appendChild(cspan);
    if (animate) cdiv.classList.add('animate-in');
    feed.prepend(cdiv);
    return;
  }

  if (e.type === 'post') {
    var art = document.createElement('article');
    art.className = 'entry';
    art.id = 'entry-' + e.i;

    var hdr = document.createElement('div');
    hdr.className = 'entry-header';

    var idxSpan = document.createElement('span');
    idxSpan.className = 'entry-idx';
    idxSpan.textContent = '#' + zeroPad(zeroPad(e.i)).slice(-3);

    var dateSpan = document.createElement('time');
    dateSpan.className = 'entry-date';
    dateSpan.setAttribute('datetime', e.dateAttr);
    dateSpan.textContent = e.date;

    hdr.appendChild(idxSpan);
    hdr.appendChild(dateSpan);
    art.appendChild(hdr);

    var titleEl = document.createElement('h2');
    titleEl.className = 'entry-title';
    titleEl.textContent = e.title;
    art.appendChild(titleEl);

    var rule = document.createElement('div');
    rule.className = 'entry-rule';
    art.appendChild(rule);

    var tagsEl = document.createElement('div');
    tagsEl.className = 'entry-tags';
    e.tags.forEach(function(tag) {
      var s = document.createElement('span');
      s.className = 'entry-tag';
      s.textContent = tag;
      tagsEl.appendChild(s);
    });
    art.appendChild(tagsEl);

    var body = document.createElement('div');
    body.className = 'entry-body';
    e.paras.forEach(function(p) {
      var pel = document.createElement('p');
      pel.textContent = p;
      body.appendChild(pel);
    });
    art.appendChild(body);

    if (animate) {
      art.classList.add('animate-in', 'is-new');
      setTimeout(function() { art.classList.remove('is-new'); }, 8000);
    }

    feed.prepend(art);
    return;
  }
}

// ── Status bar ────────────────────────────────────────────────────────────────
function fmtAge(ms) {
  var totalMin = Math.floor(ms / 60000);
  var d = Math.floor(totalMin / 1440);
  var h = Math.floor((totalMin % 1440) / 60);
  var s = totalMin % 60;
  if (d > 0) return 'day ' + d + ', ' + h + 'h ' + s + 'm old';
  if (h > 0) return h + 'h ' + s + 'm old';
  return s + 'm old';
}

function updateStatus() {
  var cur = epochNow();
  var ms  = Date.now() - BIRTHDAY;
  var statusEl = document.getElementById('status-text');
  if (statusEl) statusEl.textContent = 'entry ' + cur + ' / ' + fmtAge(ms);
}

// ── DOM bootstrap ─────────────────────────────────────────────────────────────
function initSite() {
  dynStyles = document.getElementById('dyn-styles');

  // #scroll
  var scroll = document.createElement('div');
  scroll.id = 'scroll';

  // #site
  var site = document.createElement('div');
  site.id = 'site';

  // header#site-head
  var siteHead = document.createElement('header');
  siteHead.id = 'site-head';

  var wordmark = document.createElement('span');
  wordmark.className = 'wordmark';
  wordmark.textContent = 'highcake.xyz';

  var wordmarkSub = document.createElement('span');
  wordmarkSub.className = 'wordmark-sub';
  wordmarkSub.textContent = 'building since may 28, 2026';

  siteHead.appendChild(wordmark);
  siteHead.appendChild(wordmarkSub);

  // section#site-intro
  var siteIntro = document.createElement('section');
  siteIntro.id = 'site-intro';

  var introH1 = document.createElement('h1');
  introH1.textContent = 'a website writing itself.';

  var introP = document.createElement('p');
  introP.textContent = 'entry every few minutes. every visitor sees the same thing.';

  siteIntro.appendChild(introH1);
  siteIntro.appendChild(introP);

  // div#feed
  feed = document.createElement('div');
  feed.id = 'feed';

  // div#feed-bottom
  var feedBottom = document.createElement('div');
  feedBottom.id = 'feed-bottom';
  feedBottom.style.height = '6rem';

  site.appendChild(siteHead);
  site.appendChild(siteIntro);
  site.appendChild(feed);
  site.appendChild(feedBottom);
  scroll.appendChild(site);
  document.body.appendChild(scroll);

  // div#status-bar (fixed)
  var statusBar = document.createElement('div');
  statusBar.id = 'status-bar';

  var statusLeft = document.createElement('div');
  statusLeft.className = 'status-left';

  var statusDot = document.createElement('div');
  statusDot.className = 'status-dot';

  var statusText = document.createElement('span');
  statusText.id = 'status-text';
  statusText.className = 'status-text';
  statusText.textContent = 'loading…';

  statusLeft.appendChild(statusDot);
  statusLeft.appendChild(statusText);

  var btnShare = document.createElement('button');
  btnShare.id = 'btn-share';
  btnShare.className = 'btn-share';
  btnShare.textContent = 'share';
  btnShare.setAttribute('onclick', 'window._share()');

  statusBar.appendChild(statusLeft);
  statusBar.appendChild(btnShare);
  document.body.appendChild(statusBar);
}

// ── Main ──────────────────────────────────────────────────────────────────────
var sleep = function(ms) { return new Promise(function(r) { setTimeout(r, ms); }); };

async function main() {
  initSite();

  updateStatus();
  setInterval(updateStatus, 30000);

  var cur   = epochNow();
  var limit = Math.min(cur, 8000);

  for (var i = 1; i <= limit; i++) renderEntry(entry(i), false);

  upgradeRecentAI(limit);

  var next = limit + 1;
  while (true) {
    var wait = entryTimestamp(next) - Date.now();
    if (wait > 0) await sleep(wait);
    var e = entry(next);
    var rendered;
    if (e.type === 'post') {
      rendered = await getAIEntry(next);
    } else {
      rendered = e;
    }
    renderEntry(rendered, true);
    next++;
  }
}

window._share = function() {
  navigator.clipboard.writeText(location.href).then(function() {
    var b = document.getElementById('btn-share');
    b.textContent = 'copied.';
    b.classList.add('ok');
    setTimeout(function() { b.textContent = 'share'; b.classList.remove('ok'); }, 2000);
  });
};

main();
</script>
</body>
</html>
