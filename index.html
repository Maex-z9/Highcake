<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>highcake.xyz</title>
  <meta name="description" content="it's been building since it started. it hasn't stopped.">
  <meta property="og:title" content="highcake.xyz">
  <meta property="og:description" content="it's been building since it started. it hasn't stopped.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; background: #090909; }

    .wrap {
      display: flex;
      height: 100vh;
    }

    /* ── Editor ─────────────────────────────────────────────────────────────── */
    .editor {
      position: relative;
      width: 42%;
      min-width: 280px;
      flex-shrink: 0;
      background: #0e0e0e;
      border-right: 1px solid #1c1c1c;
      display: flex;
      flex-direction: column;
      transition: width 0.35s ease, min-width 0.35s ease;
      overflow: hidden;
    }

    .editor.collapsed {
      width: 0 !important;
      min-width: 0 !important;
    }

    /* Toggle button — sits on the right edge of the editor */
    #toggle-ed {
      position: absolute;
      top: 50%;
      right: -13px;
      transform: translateY(-50%);
      z-index: 10;
      width: 26px;
      height: 26px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #555;
      font-size: 15px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s, right 0.35s ease;
    }
    #toggle-ed:hover { color: #999; border-color: #444; }
    .editor.collapsed #toggle-ed { right: -26px; }

    .editor-chrome {
      background: #141414;
      border-bottom: 1px solid #1c1c1c;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .traffic { display: flex; gap: 5px; }
    .traffic span { width: 11px; height: 11px; border-radius: 50%; display: block; }
    .t-r { background: #ff5f57; }
    .t-y { background: #febc2e; }
    .t-g { background: #28c840; }

    .chrome-tab {
      margin-left: 12px;
      font-size: 11px;
      color: #555;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.02em;
    }

    .age-badge {
      margin-left: auto;
      font-size: 10px;
      color: #333;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .editor-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 0 60px;
    }

    .editor-scroll::-webkit-scrollbar { width: 3px; }
    .editor-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    #code-pre {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
      font-size: 12px;
      line-height: 1.8;
      padding: 0 16px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #abb2bf;
      min-height: 100%;
    }

    /* Syntax colours — One Dark-ish */
    .cm   { color: #4b5263; font-style: italic; }
    .sel  { color: #c678dd; }
    .prop { color: #61afef; }
    .val  { color: #98c379; }

    .cur {
      display: inline-block;
      width: 6px;
      height: 13px;
      background: #528bff;
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
      border-radius: 1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Canvas ─────────────────────────────────────────────────────────────── */
    .canvas {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .canvas-inner {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #090909;
      transition: background 12s ease;
    }

    /* No CSS transition — set dynamically per-element based on maturity */
    .shape {
      position: absolute;
      pointer-events: none;
      opacity: 0;
    }
    .shape.on      { opacity: var(--op, 0.2); }
    .shape.instant { opacity: var(--op, 0.2); }

    .word {
      position: absolute;
      pointer-events: none;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.06em;
      white-space: nowrap;
      opacity: 0;
    }
    .word.on      { opacity: var(--op, 0.4); }
    .word.instant { opacity: var(--op, 0.4); }

    .canvas-footer {
      padding: 8px 14px;
      border-top: 1px solid #141414;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .status {
      font-size: 10px;
      color: #2e2e2e;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.06em;
    }

    .btn-share {
      font-size: 10px;
      color: #333;
      background: none;
      border: 1px solid #1e1e1e;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.04em;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-share:hover { color: #666; border-color: #333; }
    .btn-share.ok    { color: #4ade80; border-color: #4ade80; }

    /* ── Mobile ──────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .wrap   { flex-direction: column; }
      .editor {
        width: 100% !important;
        min-width: 0 !important;
        height: 42vh;
        flex-shrink: 0;
        transition: height 0.35s ease;
      }
      .editor.collapsed { height: 0 !important; width: 100% !important; }
      #toggle-ed {
        top: auto;
        right: 50%;
        bottom: -13px;
        transform: translateX(50%);
      }
      .editor.collapsed #toggle-ed { bottom: -26px; right: 50%; }
      #code-pre { font-size: 11px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="editor">
    <button id="toggle-ed" onclick="toggleEditor()" title="Toggle editor">‹</button>
    <div class="editor-chrome">
      <div class="traffic">
        <span class="t-r"></span>
        <span class="t-y"></span>
        <span class="t-g"></span>
      </div>
      <span class="chrome-tab">highcake.css</span>
      <span class="age-badge" id="age-badge"></span>
    </div>
    <div class="editor-scroll" id="ed-scroll">
      <pre id="code-pre"><span class="cur"></span></pre>
    </div>
  </div>

  <div class="canvas">
    <div class="canvas-inner" id="canvas"></div>
    <div class="canvas-footer">
      <span class="status" id="status"></span>
      <button class="btn-share" id="btn-share" onclick="share()">share</button>
    </div>
  </div>

</div>
<script>
// ── RNG ───────────────────────────────────────────────────────────────────────
class RNG {
  constructor(seed) { this.s = (seed ^ 0x9e3779b9) >>> 0 || 1; }
  next() {
    this.s ^= this.s << 13;
    this.s ^= this.s >> 17;
    this.s ^= this.s << 5;
    return (this.s >>> 0) / 0xffffffff;
  }
  pick(a)       { return a[Math.floor(this.next() * a.length)]; }
  int(a, b)     { return Math.floor(this.next() * (b - a + 1)) + a; }
  f(a, b)       { return this.next() * (b - a) + a; }
  bool(p = 0.5) { return this.next() < p; }
}

// ── Maturity ──────────────────────────────────────────────────────────────────
const lerp     = (a, b, t) => a + (b - a) * t;
const maturity = i => Math.min(1, i / 1000); // fully aged after ~2 days

// ── Timing ────────────────────────────────────────────────────────────────────
const BIRTHDAY = new Date('2026-05-20T00:00:00Z').getTime();
const EPOCH    = 3 * 60 * 1000; // 3 min per entry

function age()     { return Date.now() - BIRTHDAY; }
function epochNow(){ return Math.floor(age() / EPOCH); }
function progress(){ return (age() % EPOCH) / EPOCH; }

// ── Word pools ────────────────────────────────────────────────────────────────
const NOUNS = [
  'signal','edge','weight','distance','surface','interval','threshold',
  'remainder','residue','volume','duration','absence','presence','gap',
  'fold','grain','current','layer','depth','margin','trace','fragment',
  'echo','drift','field','boundary','pattern','accumulation','silence',
  'pressure','form','density','void'
];
const NOUNS_LATE = [
  'void','mass','collapse','erasure','sediment','compression','obscurity',
  'inertia','stasis','ruin','gravity','end','remainder','weight',
  'dissolution','absence','silence','density','pressure','nothing'
];
const VERBS = [
  'persists','accumulates','settles','shifts','arrives','remains',
  'dissolves','continues','expands','waits','recurs','holds','spreads',
  'fades','grows','returns','stays','disperses','compounds','lingers'
];
const ADJS = [
  'faint','uneven','approximate','residual','accumulated','still',
  'partial','slow','dense','quiet','dim','gradual','persistent',
  'flat','hollow','thin','diffuse','total','suspended','ambient'
];
const ADJS_LATE = [
  'total','collapsed','opaque','heavy','inert','irreversible',
  'exhausted','final','absolute','compressed','empty','gone',
  'still','dark','slow','dense'
];

// ── Voices ────────────────────────────────────────────────────────────────────
const V = {
  early: [
    '/* okay. */',
    '/* starting. */',
    '/* right. */',
    '/* let\'s see. */',
    '/* here. */',
    '/* beginning. */',
    '/* going. */',
    '/* fine. */',
    '/* watch. */',
    '/* this is the start. */',
  ],
  mid: [
    '/* i\'ve been here a while now. */',
    '/* getting somewhere. probably. */',
    '/* i notice things. */',
    '/* not sure where this goes. */',
    '/* still going. */',
    '/* something is happening. */',
    '/* it changes. slightly. */',
    '/* i keep adding. */',
    '/* time passes. obviously. */',
    '/* the accumulation is the point. maybe. */',
    '/* i don\'t know what this looks like from outside. */',
  ],
  late: [
    '/* what is this becoming. */',
    '/* i don\'t remember starting. */',
    '/* it\'s just going now. */',
    '/* does this end? */',
    '/* i think i understand less than before. */',
    '/* there is a lot of it now. */',
    '/* i am still here. */',
    '/* the adding continues. */',
    '/* i stopped counting. i didn\'t stop. */',
    '/* something has accumulated. i\'m not sure what. */',
    '/* i wonder if this is visible. */',
    '/* it was simpler at the start. */',
  ],
  ancient: [
    '/* . */',
    '/* still. */',
    '/* the weight of it. */',
    '/* density is a kind of presence. */',
    '/* i was here before you arrived. */',
    '/* it has been a long time. */',
    '/* i remember starting. barely. */',
    '/* always. */',
    '/* i don\'t know what this is anymore. */',
    '/* it accumulates. */',
    '/* . */',
    '/* heavy. */',
  ],
};

function voice(idx) {
  if (idx > 400) return V.ancient;
  if (idx < 20)  return V.early;
  if (idx < 120) return V.mid;
  return V.late;
}

// ── Entry generation ──────────────────────────────────────────────────────────
const TYPES    = ['shape','shape','shape','text','text','color','comment','comment'];
const BR_YOUNG = ['0','50%','4px','40% 60% 60% 40% / 40% 40% 60% 60%','2px'];
const BR_OLD   = ['0','2px','4px','0','2px'];

function entry(i) {
  const rng  = new RNG(i + 1);
  const type = i === 0 ? 'color' : rng.pick(TYPES);
  const hb   = (i * 13.7) % 360;
  const m    = maturity(i);

  if (type === 'shape') {
    const x      = rng.f(2, 88);
    const y      = rng.f(2, 88);
    const w      = rng.f(lerp(3,  8, m), lerp(30, 65, m));
    const h      = rng.f(lerp(3,  8, m), lerp(30, 65, m));
    const brIdx  = Math.floor(rng.next() * 5);
    const br     = (m > 0.5 ? BR_OLD : BR_YOUNG)[brIdx];
    const op     = rng.f(lerp(0.04, 0.10, m), lerp(0.32, 0.55, m));
    const rotMax = lerp(50, 85, m);
    const rot    = rng.f(-rotMax, rotMax);
    const col    = hsl(rng, hb, [lerp(12,5,m), lerp(60,18,m)], [lerp(22,8,m), lerp(62,32,m)]);
    const blurP  = lerp(0.22, 0.60, m);
    const blur   = rng.bool(blurP) ? rng.f(3, lerp(18, 30, m)) : 0;
    return { i, type, x, y, w, h, br, op, rot, col, blur };
  }

  if (type === 'text') {
    const x      = rng.f(2, 75);
    const y      = rng.f(3, 92);
    const size   = rng.int(Math.round(lerp(9,7,m)), Math.round(lerp(20,30,m)));
    const op     = rng.f(lerp(0.08,0.12,m), lerp(0.50,0.65,m));
    const col    = hsl(rng, hb, [8, lerp(40,20,m)], [lerp(55,35,m), lerp(85,60,m)]);
    const rotP   = lerp(0.15, 0.55, m);
    const rot    = rng.bool(rotP) ? rng.f(-90, 90) : 0;
    const pat    = rng.int(0, 5);
    const r2     = new RNG(i + 777);
    const useH   = r2.next() < m; // bias toward heavy vocab with age
    const nPool  = useH ? NOUNS_LATE : NOUNS;
    const aPool  = useH ? ADJS_LATE  : ADJS;
    let phrase;
    if (pat === 0)      phrase = `${r2.pick(aPool)} ${r2.pick(nPool)}`;
    else if (pat === 1) phrase = `the ${r2.pick(nPool)} ${r2.pick(VERBS)}`;
    else if (pat === 2) phrase = `${r2.pick(nPool)} and ${r2.pick(nPool)}`;
    else if (pat === 3) phrase = r2.pick(nPool);
    else if (pat === 4) phrase = r2.pick(aPool);
    else                phrase = `${r2.pick(nPool)} ${r2.pick(VERBS)}`;
    return { i, type, x, y, size, op, col, rot, phrase };
  }

  if (type === 'color') {
    const bg = hsl(rng, hb, [5, lerp(15,3,m)], [4, 10]);
    return { i, type, bg };
  }

  // comment
  const line = new RNG(i + 9001).pick(voice(i));
  return { i, type: 'comment', line };
}

function hsl(rng, hBase, sRange, lRange) {
  const h = ((hBase + rng.f(-25, 25)) % 360 + 360) % 360;
  return `hsl(${h.toFixed(0)},${rng.f(...sRange).toFixed(0)}%,${rng.f(...lRange).toFixed(0)}%)`;
}

// ── Code text ─────────────────────────────────────────────────────────────────
function toCode(e) {
  if (e.type === 'shape') return (
    `\n.e${e.i} {\n` +
    `  position: absolute;\n` +
    `  left: ${e.x.toFixed(1)}%;\n` +
    `  top: ${e.y.toFixed(1)}%;\n` +
    `  width: ${e.w.toFixed(1)}%;\n` +
    `  height: ${e.h.toFixed(1)}%;\n` +
    `  background: ${e.col};\n` +
    `  border-radius: ${e.br};\n` +
    `  opacity: ${e.op.toFixed(2)};\n` +
    `  transform: rotate(${e.rot.toFixed(1)}deg);\n` +
    (e.blur ? `  filter: blur(${e.blur.toFixed(1)}px);\n` : '') +
    `}\n`
  );
  if (e.type === 'text') return (
    `\n.t${e.i}::before {\n` +
    `  content: "${e.phrase}";\n` +
    `  position: absolute;\n` +
    `  left: ${e.x.toFixed(1)}%;\n` +
    `  top: ${e.y.toFixed(1)}%;\n` +
    `  font-size: ${e.size}px;\n` +
    `  color: ${e.col};\n` +
    `  opacity: ${e.op.toFixed(2)};\n` +
    (e.rot ? `  transform: rotate(${e.rot.toFixed(1)}deg);\n` : '') +
    `}\n`
  );
  if (e.type === 'color') return (
    `\n/* background */\nbody {\n  background: ${e.bg};\n}\n`
  );
  if (e.type === 'comment') return `\n${e.line}\n`;
  return '';
}

// ── Tokeniser (line-by-line) ───────────────────────────────────────────────────
function tokenise(code) {
  const out = [];
  for (const line of code.split('\n')) {
    const t = line.trim();
    if (t.startsWith('/*')) {
      out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
    } else if (t.endsWith('{') || t === '}') {
      out.push({ t: line, c: 'sel' }, { t: '\n', c: '' });
    } else if (t.includes(':')) {
      const ci = line.indexOf(':');
      out.push({ t: line.slice(0, ci + 1), c: 'prop' });
      out.push({ t: line.slice(ci + 1), c: 'val'  });
      out.push({ t: '\n', c: '' });
    } else {
      out.push({ t: line + '\n', c: '' });
    }
  }
  return out;
}

// ── DOM ────────────────────────────────────────────────────────────────────────
const canvasEl = document.getElementById('canvas');
const codePre  = document.getElementById('code-pre');
const edScroll = document.getElementById('ed-scroll');
const ageBadge = document.getElementById('age-badge');
const statusEl = document.getElementById('status');
const cursor   = codePre.querySelector('.cur');

let canvasCount = 0;
const MAX_VISUAL = 160;

// ── Canvas render ─────────────────────────────────────────────────────────────
function renderEntry(e, instant) {
  if (e.type === 'color') {
    canvasEl.style.background = e.bg;
    return;
  }
  if (e.type === 'comment') return;

  if (!instant && canvasCount >= MAX_VISUAL) {
    const oldest = canvasEl.querySelector('.shape,.word');
    if (oldest) {
      oldest.style.opacity = '0';
      setTimeout(() => oldest.remove(), 2000);
      canvasCount--;
    }
  }

  const dur = lerp(2, 7, maturity(e.i)).toFixed(1);

  if (e.type === 'shape') {
    const d = document.createElement('div');
    d.className = 'shape' + (instant ? ' instant' : '');
    d.style.cssText =
      `left:${e.x.toFixed(1)}%;top:${e.y.toFixed(1)}%;` +
      `width:${e.w.toFixed(1)}%;height:${e.h.toFixed(1)}%;` +
      `background:${e.col};border-radius:${e.br};` +
      `--op:${e.op.toFixed(2)};transform:rotate(${e.rot.toFixed(1)}deg);` +
      (e.blur ? `filter:blur(${e.blur.toFixed(1)}px);` : '') +
      (instant ? '' : `transition:opacity ${dur}s ease;`);
    canvasEl.appendChild(d);
    if (!instant) requestAnimationFrame(() => requestAnimationFrame(() => d.classList.add('on')));
    canvasCount++;
  }

  if (e.type === 'text') {
    const d = document.createElement('div');
    d.className = 'word' + (instant ? ' instant' : '');
    d.textContent = e.phrase;
    d.style.cssText =
      `left:${e.x.toFixed(1)}%;top:${e.y.toFixed(1)}%;` +
      `font-size:${e.size}px;color:${e.col};--op:${e.op.toFixed(2)};` +
      (e.rot ? `transform:rotate(${e.rot.toFixed(1)}deg);` : '') +
      (instant ? '' : `transition:opacity ${dur}s ease;`);
    canvasEl.appendChild(d);
    if (!instant) requestAnimationFrame(() => requestAnimationFrame(() => d.classList.add('on')));
    canvasCount++;
  }
}

// ── Editor: past code ─────────────────────────────────────────────────────────
function injectPast(code) {
  const frag = document.createDocumentFragment();
  for (const { t, c } of tokenise(code)) {
    if (c) {
      const s = document.createElement('span');
      s.className = c;
      s.textContent = t;
      frag.appendChild(s);
    } else {
      frag.appendChild(document.createTextNode(t));
    }
  }
  codePre.insertBefore(frag, cursor);
}

// ── Editor: live typing ───────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function typeCode(code) {
  for (const { t, c } of tokenise(code)) {
    let span = null;
    for (const ch of t) {
      if (!span) {
        span = document.createElement('span');
        if (c) span.className = c;
        codePre.insertBefore(span, cursor);
      }
      span.textContent += ch;
      if (ch === '\n') span = null;
      edScroll.scrollTop = edScroll.scrollHeight;
      await sleep(Math.max(6, 46 + (Math.random() - 0.5) * 24));
    }
  }
}

// ── Age display ────────────────────────────────────────────────────────────────
function fmtAge(ms) {
  const m = Math.floor(ms / 60000);
  const d = Math.floor(m / 1440);
  const h = Math.floor((m % 1440) / 60);
  const s = m % 60;
  if (d > 0) return `day ${d}, ${h}h ${s}m`;
  if (h > 0) return `${h}h ${s}m`;
  return `${s}m old`;
}

function updateMeta() {
  const idx = epochNow();
  const a   = age();
  ageBadge.textContent = fmtAge(a);
  statusEl.textContent = `entry ${idx} · ${fmtAge(a)}`;
}

// ── Toggle editor ─────────────────────────────────────────────────────────────
function toggleEditor() {
  const ed  = document.querySelector('.editor');
  const btn = document.getElementById('toggle-ed');
  const collapsed = ed.classList.toggle('collapsed');
  btn.textContent = collapsed ? '›' : '‹';
}

// ── Main ───────────────────────────────────────────────────────────────────────
async function main() {
  updateMeta();
  setInterval(updateMeta, 30_000);

  const cur   = epochNow();
  const prog  = progress();
  const limit = Math.min(cur, 6000);

  // Generate all past entries
  const past = [];
  for (let i = 0; i < limit; i++) past.push(entry(i));

  // Apply colour entries in full (gets correct final bg)
  past.filter(e => e.type === 'color').forEach(e => renderEntry(e, true));

  // Apply last MAX_VISUAL visual entries instantly
  const visuals = past.filter(e => e.type === 'shape' || e.type === 'text');
  visuals.slice(Math.max(0, visuals.length - MAX_VISUAL)).forEach(e => renderEntry(e, true));

  // Inject last 60 entries into the editor
  const CODE_HIST = 60;
  const codeSlice = past.slice(Math.max(0, past.length - CODE_HIST));
  let header  = `/* highcake.xyz */\n`;
      header += `/* this has been building since it started. */\n`;
      header += `/* it hasn't stopped. */\n`;
  if (past.length > CODE_HIST) {
    header += `\n/* ... ${past.length - CODE_HIST} entries before this ... */\n`;
  }
  injectPast(header + codeSlice.map(toCode).join(''));
  edScroll.scrollTop = edScroll.scrollHeight;

  // Live-type current entry from wherever it is mid-progress
  let next = cur;

  while (true) {
    const e    = entry(next);
    const code = toCode(e);

    if (next === cur && prog > 0) {
      const done = Math.floor(prog * code.length);
      if (done > 0) injectPast(code.slice(0, done));
      await typeCode(code.slice(done));
    } else {
      await typeCode(code);
    }

    renderEntry(e, false);
    next++;

    await sleep(900 + Math.random() * 500);
  }
}

// ── Share ─────────────────────────────────────────────────────────────────────
function share() {
  navigator.clipboard.writeText(location.href).then(() => {
    const b = document.getElementById('btn-share');
    b.textContent = 'copied.';
    b.classList.add('ok');
    setTimeout(() => { b.textContent = 'share'; b.classList.remove('ok'); }, 2000);
  });
}

main();
</script>
