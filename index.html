    .editor-scroll::-webkit-scrollbar { width: 3px; }

<script>
// ── RNG ───────────────────────────────────────────────────────────────────────
class RNG {
  constructor(seed) { this.s = (seed ^ 0x9e3779b9) >>> 0 || 1; }
  next() { this.s ^= this.s << 13; this.s ^= this.s >> 17; this.s ^= this.s << 5; return (this.s >>> 0) / 0xffffffff; }
  pick(a)       { return a[Math.floor(this.next() * a.length)]; }
  int(a, b)     { return Math.floor(this.next() * (b - a + 1)) + a; }
  f(a, b)       { return this.next() * (b - a) + a; }
  bool(p = 0.5) { return this.next() < p; }
}

// ── Maturity & timing ─────────────────────────────────────────────────────────
const lerp     = (a, b, t) => a + (b - a) * t;
const maturity = i => Math.min(1, i / 1000);
const BIRTHDAY = new Date('2026-05-20T00:00:00Z').getTime();
const EPOCH    = 3 * 60 * 1000;
function age()      { return Date.now() - BIRTHDAY; }
function epochNow() { return Math.floor(age() / EPOCH); }
function progress() { return (age() % EPOCH) / EPOCH; }

function entryDate(i) {
  const d = new Date(BIRTHDAY + i * EPOCH);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function entryDateAttr(i) {
  const d = new Date(BIRTHDAY + i * EPOCH);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const POST_TAGS = [
  'notes', 'log', 'ongoing', 'update', 'fragment',
  'observation', 'process', 'record', 'output', 'dispatch',
  'status', 'accumulation', 'thoughts', 'evidence', 'entry',
];

const NAV_LABELS = [
  'about','archive','notes','now','things',
  'more','journal','log','collected','here',
];

// ── Voices ────────────────────────────────────────────────────────────────────
const V = {
  early:   [
    '<!-- okay. -->',
    '<!-- starting. -->',
    '<!-- right. -->',
    '<!-- here. -->',
    '<!-- going. -->',
    '<!-- this is entry one. -->',

  ],
  mid:     [

function voice(i) {
  if (i > 400) return V.ancient;
  if (i < 20)  return V.early;
  if (i < 120) return V.mid;
  return V.late;
}

// ── Entry generation ──────────────────────────────────────────────────────────
function makePost(i, rng, m) {
  const tier  = m < 0.15 ? 'early' : m < 0.55 ? 'mid' : 'late';
  const title = rng.pick(TITLES[tier]);

  const paraCount = m < 0.15 ? rng.int(1, 2) : rng.int(1, 3);
  const paras = [];
  const used  = new Set();
  for (let p = 0; p < paraCount; p++) {
    let pool;
    if      (m < 0.15) pool = PARAS.early;
    else if (m < 0.4)  pool = rng.bool(0.8) ? PARAS.mid  : PARAS.early;
    else if (m < 0.55) pool = PARAS.mid;
    else if (m < 0.75) pool = rng.bool(0.75) ? PARAS.late : PARAS.mid;
    else               pool = PARAS.late;

    let para, tries = 0;
    do { para = rng.pick(pool); tries++; } while (used.has(para) && tries < 8);
    used.add(para);
    paras.push(para);
  }

  const tagCount = rng.int(1, 2);
  const seen = new Set(); const tags = [];
  for (let k = 0; k < 8 && tags.length < tagCount; k++) {
    const t = rng.pick(POST_TAGS);
    if (!seen.has(t)) { seen.add(t); tags.push(t); }
  }

  return { i, type: 'post', title, paras, tags, date: entryDate(i), dateAttr: entryDateAttr(i) };
}

const NAV_RESERVED = ['about', 'archive', 'notes', 'now'];

function entry(i) {
  const rng = new RNG(i + 1);
  const m   = maturity(i);

  if (i === 0) return { i, type: 'hero' };
  if (i >= 1 && i <= 4) return { i, type: 'nav', label: NAV_RESERVED[i - 1] };

  const typePool = m < 0.12
    ? ['post', 'post', 'post', 'style', 'comment']
    : m < 0.45
    ? ['post', 'post', 'post', 'post', 'nav', 'style', 'comment']
    : ['post', 'post', 'post', 'comment', 'comment', 'style'];

  const type = rng.pick(typePool);

  if (type === 'post') return makePost(i, rng, m);

  if (type === 'nav') return { i, type: 'nav', label: rng.pick(NAV_LABELS) };

  if (type === 'style') {
    const hb  = (i * 13.7) % 360;
    const h   = ((hb + rng.f(-30, 30)) % 360 + 360) % 360;
    const s   = lerp(38, 12, m);
    const l   = lerp(52, 36, m);
    return { i, type: 'style', col: `hsl(${h.toFixed(0)},${s.toFixed(0)}%,${l.toFixed(0)}%)` };
  }

  const line = new RNG(i + 9001).pick(voice(i));
  return { i, type: 'comment', line };
}

// ── Code text ─────────────────────────────────────────────────────────────────
function toCode(e) {
  if (e.type === 'hero') return (
    `<div class="site-intro">\n` +
    `  <h1>highcake.xyz</h1>\n` +
    `  <p class="tagline">a website that builds itself.\n  started may 2026.</p>\n` +
    `</div>\n`
  );
  if (e.type === 'nav') return `  <a href="#${e.label}">${e.label}</a>\n`;
  if (e.type === 'post') {
    const tagsStr  = e.tags.map(t => `<span class="post-tag">${t}</span>`).join(' ');
    const parasStr = e.paras.map(p => `    <p>${p}</p>`).join('\n');
    return (
      `\n<article class="post" id="post-${e.i}">\n` +
      `  <div class="post-meta">\n` +
      `    <time datetime="${e.dateAttr}">${e.date}</time>\n` +
      `    ${tagsStr}\n` +
      `  </div>\n` +
      `  <h2>${e.title}</h2>\n` +
      `  <div class="post-body">\n` +
      parasStr + `\n` +
      `  </div>\n` +
      `</article>\n`
    );
  }
  if (e.type === 'style') return `#built-site { --accent: ${e.col}; }\n`;
  if (e.type === 'comment') return `\n${e.line}\n`;
  return '';
}

function fileFor(e) { return e.type === 'style' ? 'style.css' : 'index.html'; }

// ── Tokeniser ─────────────────────────────────────────────────────────────────
function tokenise(code, mode) {
  const out = [];
  for (const line of code.split('\n')) {
    const t = line.trim();
    if (!t) { out.push({ t: '\n', c: '' }); continue; }

    if (mode === 'html') {
      if (t.startsWith('<!--')) {
        out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
      } else if (t.startsWith('</')) {
        out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
      } else if (t.startsWith('<')) {
        const m = t.match(/^<([a-z][a-z0-9]*)/i);
        if (m) {
          const indent = line.match(/^(\s*)/)[1];
          const after  = t.slice(m[0].length);
          out.push({ t: indent + '<', c: '' });
          out.push({ t: m[1], c: 'sel' });
          const gt = after.indexOf('>');
          if (gt !== -1) {
            if (gt > 0) out.push({ t: after.slice(0, gt), c: 'attr' });
            out.push({ t: '>', c: '' });
            if (after.slice(gt + 1)) out.push({ t: after.slice(gt + 1), c: 'val' });
          } else {
            out.push({ t: after, c: 'attr' });
          }
        } else {
          out.push({ t: line, c: '' });
        }
        out.push({ t: '\n', c: '' });
      } else {
        out.push({ t: line + '\n', c: 'val' });
      }
    } else {
      if (t.startsWith('/*') || t.startsWith('//')) {
        out.push({ t: line, c: 'cm' }, { t: '\n', c: '' });
      } else if (t.endsWith('{') || t === '}') {
        out.push({ t: line, c: 'sel' }, { t: '\n', c: '' });
      } else if (t.includes(':')) {
        const ci = line.indexOf(':');
        out.push({ t: line.slice(0, ci + 1), c: 'prop' });
        out.push({ t: line.slice(ci + 1), c: 'val' });
        out.push({ t: '\n', c: '' });
      } else {
        out.push({ t: line + '\n', c: '' });
      }
    }
  }
  return out;
}

    line-height: 1.7;
  }
  #site-header {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(12,12,12,0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  #site-nav {
    display: flex; gap: 1.5rem; align-items: center;
    flex-wrap: wrap; max-width: 720px; margin: 0 auto;
  }
  #site-nav a {
    text-decoration: none; color: var(--muted);
    font-size: 13px; transition: color 0.15s;
  }
  #site-nav a:hover { color: var(--text); }
  #site-nav .logo { color: var(--text); font-weight: 600; font-size: 14px; }
  #site-main {
    max-width: 680px; margin: 0 auto;
    padding: 0 2rem 6rem;
  }
  .site-intro {
    padding: 5rem 0 3.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .site-intro h1 {
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 800; letter-spacing: -0.04em;
    color: #f0f0f0; margin-bottom: 0.8rem; line-height: 1.1;
  }
  .site-intro .tagline {
    color: #444; font-size: 13px; max-width: 40ch; line-height: 1.6;
  }
  article.post {
    padding: 2.8rem 0;
    border-top: 1px solid var(--border);
  }
  .post-meta {
    display: flex; align-items: center; gap: 0.7rem;
    margin-bottom: 0.6rem; flex-wrap: wrap;
  }
  time.post-date {
    font-size: 11px; color: #3a3a3a;
    font-family: 'SF Mono','Fira Code',monospace;
    letter-spacing: 0.04em;
  }
  .post-tag {
    font-size: 10px; color: #2e2e2e;
    border: 1px solid #222;
    padding: 1px 7px; border-radius: 2px;
    font-family: monospace; letter-spacing: 0.04em;
  }
  article.post h2 {
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.25; color: #ddd;
    margin-bottom: 1rem;
  }
  .post-body p {
    color: var(--text); font-size: 15px;
    line-height: 1.8; margin-bottom: 0.7rem;
    max-width: 58ch;
  }
  #site-footer {
    padding: 3rem 2rem; border-top: 1px solid var(--border);
    text-align: center; color: #222;
    font-size: 11px; font-family: monospace; letter-spacing: 0.06em;
  }
  .site-entry { animation: fadeUp 0.6s ease forwards; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
`;

// ── Build site DOM ────────────────────────────────────────────────────────────
let siteMain, siteNav, dynStyles;

function initSite() {
  const root = document.getElementById('built-site');

  const style = document.createElement('style');
  style.textContent = BASE_CSS;
  root.appendChild(style);

  dynStyles = document.createElement('style');
  dynStyles.id = 'dyn-styles';
  root.appendChild(dynStyles);

  const header = document.createElement('header');
  header.id = 'site-header';
  header.innerHTML = `<nav id="site-nav"><a href="#" class="logo">highcake.xyz</a></nav>`;
  root.appendChild(header);
  siteNav = header.querySelector('#site-nav');

  const main = document.createElement('main');
  main.id = 'site-main';
  root.appendChild(main);
  siteMain = main;

  const footer = document.createElement('footer');
  footer.id = 'site-footer';
  footer.textContent = `highcake.xyz · building since may 2026`;
  root.appendChild(footer);
}

// ── Canvas render ─────────────────────────────────────────────────────────────
function renderEntry(e, instant) {
  const anim = !instant;

  if (e.type === 'hero') {
    const div = document.createElement('div');
    div.className = 'site-intro';
    div.innerHTML =
      `<h1>highcake.xyz</h1>` +
      `<p class="tagline">a website that builds itself.<br>started may 2026.</p>`;
    siteMain.appendChild(div);
    return;
  }

  if (e.type === 'nav') {
    const a = document.createElement('a');
    a.href = `#${e.label}`;
    a.textContent = e.label;
    if (anim) a.classList.add('site-entry');
    siteNav.appendChild(a);
    return;
  }

  if (e.type === 'post') {
    const art = document.createElement('article');
    art.className = 'post' + (anim ? ' site-entry' : '');
    art.id = `post-${e.i}`;

    const meta = document.createElement('div');
    meta.className = 'post-meta';
    const time = document.createElement('time');
    time.setAttribute('datetime', e.dateAttr);
    time.className = 'post-date';
    time.textContent = e.date;
    meta.appendChild(time);
    e.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'post-tag';
      span.textContent = tag;
      meta.appendChild(span);
    });
    art.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.textContent = e.title;
    art.appendChild(h2);

    const body = document.createElement('div');
    body.className = 'post-body';
    e.paras.forEach(p => {
      const el = document.createElement('p');
      el.textContent = p;
      body.appendChild(el);
    });
    art.appendChild(body);

    siteMain.appendChild(art);
    if (anim) scrollSite();
    return;
  }

  if (e.type === 'style') {
    dynStyles.textContent += `\n#built-site { --accent: ${e.col}; }\n`;
    return;
  }
}

function scrollSite() {
  const site = document.getElementById('built-site');
  site.scrollTo({ top: site.scrollHeight, behavior: 'smooth' });
}

// ── Editor ────────────────────────────────────────────────────────────────────
const codePre  = document.getElementById('code-pre');
const edScroll = document.getElementById('ed-scroll');
const cursor   = codePre.querySelector('.cur');
const fileTab  = document.getElementById('file-tab');

function injectPast(code, mode) {
  const frag = document.createDocumentFragment();
  for (const { t, c } of tokenise(code, mode)) {
    if (c) { const s = document.createElement('span'); s.className = c; s.textContent = t; frag.appendChild(s); }
    else frag.appendChild(document.createTextNode(t));
  }
  codePre.insertBefore(frag, cursor);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function typeCode(code, mode) {
  fileTab.textContent = mode === 'css' ? 'style.css' : 'index.html';
  for (const { t, c } of tokenise(code, mode)) {
    let span = null;
    for (const ch of t) {
      if (!span) { span = document.createElement('span'); if (c) span.className = c; codePre.insertBefore(span, cursor); }
      span.textContent += ch;
      if (ch === '\n') span = null;
      edScroll.scrollTop = edScroll.scrollHeight;
      await sleep(Math.max(6, 42 + (Math.random() - 0.5) * 20));
    }
  }
}

// ── Age display ───────────────────────────────────────────────────────────────
function fmtAge(ms) {
  const m = Math.floor(ms / 60000), d = Math.floor(m / 1440), h = Math.floor((m % 1440) / 60), s = m % 60;
  if (d > 0) return `day ${d}, ${h}h ${s}m`;
  if (h > 0) return `${h}h ${s}m`;
  return `${s}m old`;
}
function updateMeta() {
  const idx = epochNow(), a = age();
  document.getElementById('age-badge').textContent = fmtAge(a);
  document.getElementById('status').textContent = `post ${idx} · ${fmtAge(a)}`;
}

// ── Toggle editor ─────────────────────────────────────────────────────────────
function toggleEditor() {
  const ed  = document.querySelector('.editor');
  const btn = document.getElementById('toggle-ed');
  btn.textContent = ed.classList.toggle('collapsed') ? '›' : '‹';
}

// ── Main ───────────────────────────────────────────────────────────────────────
async function main() {
  initSite();
  updateMeta();
  setInterval(updateMeta, 30_000);

  const cur   = epochNow();
  const prog  = progress();
  const limit = Math.min(cur, 8000);

  const past = [];
  for (let i = 0; i < limit; i++) past.push(entry(i));
  past.forEach(e => renderEntry(e, true));

  const CODE_HIST = 50;
  const slice     = past.slice(Math.max(0, past.length - CODE_HIST));
  let hdr = `<!-- highcake.xyz -->\n<!-- blog, ongoing -->\n<!-- building since may 2026 -->\n`;
  if (past.length > CODE_HIST) hdr += `\n<!-- ... ${past.length - CODE_HIST} entries before this ... -->\n`;
  injectPast(hdr + slice.map(e => toCode(e)).join(''), 'html');
  edScroll.scrollTop = edScroll.scrollHeight;

  let next = cur;
  while (true) {
    const e    = entry(next);
    const code = toCode(e);
    const mode = fileFor(e) === 'style.css' ? 'css' : 'html';

    if (next === cur && prog > 0) {
      const done = Math.floor(prog * code.length);
      if (done > 0) injectPast(code.slice(0, done), mode);
      await typeCode(code.slice(done), mode);
    } else {
      await typeCode(code, mode);
    }

    renderEntry(e, false);
    next++;
    await sleep(800 + Math.random() * 400);
  }
}

// ── Share ─────────────────────────────────────────────────────────────────────
function share() {
  navigator.clipboard.writeText(location.href).then(() => {
    const b = document.getElementById('btn-share');
    b.textContent = 'copied.'; b.classList.add('ok');
    setTimeout(() => { b.textContent = 'share'; b.classList.remove('ok'); }, 2000);
  });
}

main();
</script>
